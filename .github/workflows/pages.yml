name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Emscripten
        uses: emscripten-core/setup-emsdk@v16

      - name: Build MysteryOS
        shell: bash
        run: |
          chmod +x build.sh
          ./build.sh

      - name: Write anomaly config
        shell: pwsh
        run: |
          if ($env:GROQ_API_KEY) {
            $model = if ($env:GROQ_MODEL) { $env:GROQ_MODEL } else { "llama-3.1-8b-instant" }
            $config = @{
              enabled = $true
              groqApiKey = $env:GROQ_API_KEY
              model = $model
            } | ConvertTo-Json
            Set-Content -Path docs/anomaly-config.js -Value "window.MYSTERYOS_ANOMALY = $config;"
          } else {
            Copy-Item docs/anomaly-config.example.js docs/anomaly-config.js
          }
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GROQ_MODEL: ${{ vars.GROQ_MODEL }}

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs
      - id: deployment
        uses: actions/deploy-pages@v4
