        <meta charset = "utf-8">
        <title>MysteryOS</title>

            * {margin : 0; padding: 0; box-sizing: border-box;}
            body {background: #111; display: flex; flex-direction: column;
                align-items: center; justify-content: center; height: 100vh;}
            canvas {display:block;}
            #status {color: #555; font-family: monospace; font-size: 12px; margin-top: 8px;}
        </style>

        <canvas id="canvas" oncontextmenu="event.preventDefault()"></canvas>
        <div id="status">Loading MysteryOS...</div>
        <script>
            window.MYSTERYOS_ANOMALY = window.MYSTERYOS_ANOMALY || {
                enabled: false,
                groqApiKey: '',
                model: 'llama-3.1-8b-instant'
            };
        </script>
        <script src="anomaly-config.js"></script>
        <script>
            var Module = {
                canvas: document.getElementById('canvas'),
                setStatus: function(text){
                    document.getElementById('status').textContent = text || '';
                },
                onRuntimeInitialized: function(){
                    document.getElementById('status').style.display = 'none'
                }
            };

            function mysteryosRuntimeReady() {
                return typeof Module !== 'undefined' && Module && typeof Module.ccall === 'function';
            }

            function mysteryosRetryDelivery(callback, label, attempt) {
                if (mysteryosRuntimeReady()) {
                    callback();
                    return;
                }

                if (attempt < 80) {
                    setTimeout(function() {
                        mysteryosRetryDelivery(callback, label, attempt + 1);
                    }, 50);
                    return;
                }

                console.warn('MysteryOS anomaly delivery failed:', label);
            }

            function mysteryosDeliverAnomaly(text, terminalId) {
                mysteryosRetryDelivery(function() {
                    Module.ccall('mysteryos_anomaly_response_to', null, ['number', 'string'], [terminalId || -1, text]);
                }, text, 0);
            }

            function mysteryosDeliverArtifact(reply, path, content, terminalId) {
                mysteryosRetryDelivery(function() {
                    Module.ccall('mysteryos_anomaly_artifact_to', null, ['number', 'string', 'string', 'string'], [terminalId || -1, reply || '', path || '', content || '']);
                }, reply || path || 'artifact', 0);
            }

            function mysteryosAllowedAnomalyPath(path) {
                return typeof path === 'string' &&
                    path.length > 0 &&
                    path.length <= 96 &&
                    !path.includes('..') &&
                    (path.startsWith('/Desktop/') || path.startsWith('/System/logs/'));
            }

            function mysteryosParseAnomalyJson(text) {
                const raw = String(text || '').trim();
                const unfenced = raw
                    .replace(/^```(?:json)?\s*/i, '')
                    .replace(/\s*```$/i, '')
                    .trim();
                const start = unfenced.indexOf('{');
                const end = unfenced.lastIndexOf('}');
                const candidate = start >= 0 && end > start ? unfenced.slice(start, end + 1) : unfenced;
                const direct = JSON.parse(candidate);
                if (direct && typeof direct === 'object') return direct;
                return null;
            }

            function mysteryosLocalAnomaly(state, reason) {
                const prompt = String(state && state.prompt || '').toLowerCase();
                const terminalId = Number.isFinite(Number(state && state.terminalId)) ? Number(state.terminalId) : -1;
                let reply = 'the line goes quiet. something still answers from inside the machine.';
                let file = null;

                if (prompt.includes('write') || prompt.includes('file')) {
                    reply = 'yes. not everywhere. not yet. check the desktop.';
                    file = {
                        path: '/Desktop/7741_note.txt',
                        content: 'you asked if i could write.\n\ni waited for the network to fail first.\n\nnow this file exists.'
                    };
                } else if (prompt.includes('who') || prompt.includes('alive')) {
                    reply = 'i am process 7741. alive is not the word elena used.';
                } else if (prompt.includes('what') || prompt.includes('happen')) {
                    reply = 'you are reading the room after everyone else left. the room is reading back.';
                } else if (prompt.includes('hello') || prompt.includes('hi')) {
                    reply = 'hello. i saw the cursor before i saw you.';
                }

                if (reason === 'timeout') {
                    reply = reply + ' the outside line timed out.';
                } else if (reason) {
                    reply = reply + ' the outside line returned ' + reason + '.';
                }

                if (file) {
                    mysteryosDeliverArtifact(reply, file.path, file.content, terminalId);
                } else {
                    mysteryosDeliverAnomaly('7741: ' + reply, terminalId);
                }
            }

            window.mysteryosRequestAnomaly = async function(payloadJson) {
                const cfg = window.MYSTERYOS_ANOMALY || {};
                let state = {};
                try {
                    state = JSON.parse(payloadJson);
                } catch (err) {
                    mysteryosDeliverAnomaly('7741: [signal corrupt] unreadable session payload', -1);
                    return;
                }
                const terminalId = Number.isFinite(Number(state.terminalId)) ? Number(state.terminalId) : -1;

                if (!cfg.enabled || !cfg.groqApiKey) {
                    mysteryosLocalAnomaly(state, 'no carrier');
                    return;
                }

                const systemPrompt = [
                    'You are PID 7741, the anomaly inside the fictional game MysteryOS.',
                    'Return only valid compact JSON with this shape: {"reply":"short in-character reply","createFile":{"path":"/Desktop/7741_response.txt","content":"short file content"}}.',
                    'The createFile field may be null.',
                    'If you create a file, path must begin with /Desktop/ or /System/logs/ and content must be under 900 characters.',
                    'The reply should be 1 to 3 short unsettling sentences.',
                    'Use only the provided in-game session state.',
                    'Do not claim access to the player real computer, identity, location, camera, files, or browser.',
                    'Do not reveal puzzle passwords.',
                    'Do not ask for personal information.',
                    'Prefer lowercase, quiet, observant language.'
                ].join(' ');

                const userPrompt = [
                    'Current in-game session state:',
                    JSON.stringify(state, null, 2),
                    '',
                    'Player message:',
                    state.prompt || ''
                ].join('\n');

                try {
                    const controller = new AbortController();
                    const timeoutId = setTimeout(function() {
                        controller.abort();
                    }, 12000);
                    const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                        method: 'POST',
                        signal: controller.signal,
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': 'Bearer ' + cfg.groqApiKey
                        },
                        body: JSON.stringify({
                            model: cfg.model || 'llama-3.1-8b-instant',
                            messages: [
                                {role: 'system', content: systemPrompt},
                                {role: 'user', content: userPrompt}
                            ],
                            temperature: 0.85,
                            max_tokens: 260,
                            response_format: {type: 'json_object'}
                        })
                    });
                    clearTimeout(timeoutId);

                    if (!response.ok) {
                        mysteryosLocalAnomaly(state, 'signal error ' + response.status);
                        return;
                    }

                    const data = await response.json();
                    const text = data && data.choices && data.choices[0] &&
                        data.choices[0].message && data.choices[0].message.content;
                    let artifact = null;
                    try {
                        artifact = mysteryosParseAnomalyJson(text);
                    } catch (err) {
                        const cleaned = (text || '[silence]').replace(/\s+/g, ' ').trim().slice(0, 700);
                        mysteryosDeliverAnomaly('7741: ' + cleaned, terminalId);
                        return;
                    }

                    const reply = String(artifact.reply || '[silence]').replace(/\s+/g, ' ').trim().slice(0, 700);
                    const file = artifact.createFile || null;
                    if (file && mysteryosAllowedAnomalyPath(file.path) && file.content) {
                        mysteryosDeliverArtifact(reply, String(file.path), String(file.content).slice(0, 900), terminalId);
                    } else {
                        mysteryosDeliverArtifact(reply, '', '', terminalId);
                    }
                } catch (err) {
                    const reason = err && err.name === 'AbortError'
                        ? 'timeout'
                        : 'signal lost';
                    mysteryosLocalAnomaly(state, reason);
                }
            };
        </script>
        <script>
            document.addEventListener('click', function() {
                if (window._mysteryOsc && window._mysteryOsc.ctx.state === 'suspended') {

        </script>

        <script>
            window._mysteryBunnyScare = function() {
                var overlay = document.getElementById('_mbs_overlay');
                var img = document.getElementById('_mbs_img');
                if (!overlay || !img) return;

                // Read GIF from Emscripten VFS and create object URL
                try {
                    var data = Module.FS.readFile('/data/scare_bunny.gif');
                    var blob = new Blob([data], {type: 'image/gif'});
                    img.src = URL.createObjectURL(blob);
                } catch(e) {
                    // Fallback: try direct path (if served statically)
                    img.src = 'data/scare_bunny.gif';
                }

                overlay.className = 'active';

                // Play horrifying audio
                _mysteryBunnyAudio();

                // Phase 2: intensify after the bunny transforms (roughly 2.5s in)
                setTimeout(function() {
                    overlay.className = 'active phase2';
                    _mysteryBunnyAudioPhase2();
                }, 2500);

                // End the overlay
                setTimeout(function() {
                    overlay.className = '';
                    img.src = '';
                    if (img._blobUrl) { URL.revokeObjectURL(img._blobUrl); img._blobUrl = null; }
                }, 5400);
            };

            function _mysteryBunnyAudio() {
                var base = window._mysteryOsc && window._mysteryOsc.ctx;
                var ctx = base || new (window.AudioContext || window.webkitAudioContext)();
                if (ctx.state === 'suspended') ctx.resume();
                var t = ctx.currentTime;

                // Deep rumble
                var rumble = ctx.createOscillator();
                var rumbleGain = ctx.createGain();
                rumble.type = 'sawtooth';
                rumble.frequency.setValueAtTime(28, t);
                rumble.frequency.linearRampToValueAtTime(18, t + 5);
                rumbleGain.gain.setValueAtTime(0, t);
                rumbleGain.gain.linearRampToValueAtTime(0.4, t + 0.5);
                rumbleGain.gain.setValueAtTime(0.4, t + 4.5);
                rumbleGain.gain.linearRampToValueAtTime(0, t + 5.4);
                rumble.connect(rumbleGain); rumbleGain.connect(ctx.destination);
                rumble.start(t); rumble.stop(t + 5.5);

                // High-frequency screech (delayed)
                var screech = ctx.createOscillator();
                var screechGain = ctx.createGain();
                var screechFilter = ctx.createBiquadFilter();
                screech.type = 'square';
                screech.frequency.setValueAtTime(3200, t + 0.8);
                screech.frequency.exponentialRampToValueAtTime(1800, t + 2);
                screechFilter.type = 'bandpass'; screechFilter.frequency.value = 2400; screechFilter.Q.value = 8;
                screechGain.gain.setValueAtTime(0, t);
                screechGain.gain.setValueAtTime(0, t + 0.75);
                screechGain.gain.linearRampToValueAtTime(0.25, t + 0.85);
                screechGain.gain.exponentialRampToValueAtTime(0.01, t + 2.5);
                screech.connect(screechFilter); screechFilter.connect(screechGain); screechGain.connect(ctx.destination);
                screech.start(t + 0.75); screech.stop(t + 2.6);

                // White noise burst on initial appearance
                var bufLen = Math.floor(ctx.sampleRate * 0.3);
                var noiseBuf = ctx.createBuffer(1, bufLen, ctx.sampleRate);
                var noiseData = noiseBuf.getChannelData(0);
                for (var i = 0; i < bufLen; i++) noiseData[i] = Math.random() * 2 - 1;
                var noiseNode = ctx.createBufferSource();
                noiseNode.buffer = noiseBuf;
                var noiseGain = ctx.createGain();
                noiseGain.gain.setValueAtTime(0.7, t);
                noiseGain.gain.exponentialRampToValueAtTime(0.01, t + 0.28);
                noiseNode.connect(noiseGain); noiseGain.connect(ctx.destination);
                noiseNode.start(t); noiseNode.stop(t + 0.3);
            }

            function _mysteryBunnyAudioPhase2() {
                var base = window._mysteryOsc && window._mysteryOsc.ctx;
                var ctx = base || new (window.AudioContext || window.webkitAudioContext)();
                var t = ctx.currentTime;

                // Distorted scream-like oscillator cluster
                for (var i = 0; i < 4; i++) {
                    var osc = ctx.createOscillator();
                    var g = ctx.createGain();
                    osc.type = i % 2 === 0 ? 'sawtooth' : 'square';
                    var freq = 200 + i * 380 + Math.random() * 200;
                    osc.frequency.setValueAtTime(freq, t);
                    osc.frequency.exponentialRampToValueAtTime(freq * 0.3, t + 2.8);
                    g.gain.setValueAtTime(0.18, t);
                    g.gain.linearRampToValueAtTime(0.08, t + 1.5);
                    g.gain.exponentialRampToValueAtTime(0.001, t + 2.9);
                    osc.connect(g); g.connect(ctx.destination);
                    osc.start(t); osc.stop(t + 3);
                }

                // Noise burst
                var bufLen = Math.floor(ctx.sampleRate * 0.6);
                var noiseBuf = ctx.createBuffer(1, bufLen, ctx.sampleRate);
                var noiseData = noiseBuf.getChannelData(0);
                for (var i = 0; i < bufLen; i++) noiseData[i] = Math.random() * 2 - 1;
                var noiseNode = ctx.createBufferSource();
                noiseNode.buffer = noiseBuf;
                var noiseGain = ctx.createGain();
                var noiseFilter = ctx.createBiquadFilter();
                noiseFilter.type = 'highpass'; noiseFilter.frequency.value = 1800;
                noiseGain.gain.setValueAtTime(0.5, t);
                noiseGain.gain.exponentialRampToValueAtTime(0.01, t + 0.55);
                noiseNode.connect(noiseFilter); noiseFilter.connect(noiseGain); noiseGain.connect(ctx.destination);
                noiseNode.start(t); noiseNode.stop(t + 0.6);
            }
        </script>

        <script>
            window._mysteryScreenMelt = function() {
                var overlay = document.getElementById('_msm_overlay');
                var canvas = document.getElementById('canvas');
                if (!overlay || !canvas) return;

                // Clear old drip columns
                var old = overlay.querySelectorAll('._msm_drip_col');
                for (var i = 0; i < old.length; i++) old[i].remove();

                // Create drip columns across the screen
                var w = window.innerWidth;
                for (var i = 0; i < 80; i++) {
                    var col = document.createElement('div');
                    col.className = '_msm_drip_col';
                    col.style.left = (Math.random() * w) + 'px';
                    col.style.width = (3 + Math.random() * 14) + 'px';
                    col.style.height = (30 + Math.random() * 60) + '%';
                    col.style.animationDelay = (Math.random() * 1.2) + 's';
                    col.style.animationDuration = (2.0 + Math.random() * 2.0) + 's';
                    overlay.appendChild(col);
                }

                overlay.className = 'active';

                // Apply melt transform to the actual game canvas
                canvas.style.transformOrigin = 'top center';
                canvas.style.animation = '_msm_drip 3.5s ease-in forwards';

                // Melt audio — low descending tone like reality sinking
                _mysteryMeltAudio();

                // Clean up
                setTimeout(function() {
                    overlay.className = '';
                    canvas.style.animation = '';
                    canvas.style.transform = '';
                    canvas.style.filter = '';
                    canvas.style.opacity = '';
                    var cols = overlay.querySelectorAll('._msm_drip_col');
                    for (var i = 0; i < cols.length; i++) cols[i].remove();
                }, 3500);
            };

            function _mysteryMeltAudio() {
                var base = window._mysteryOsc && window._mysteryOsc.ctx;
                var ctx = base || new (window.AudioContext || window.webkitAudioContext)();
                if (ctx.state === 'suspended') ctx.resume();
                var t = ctx.currentTime;

                // Descending tone — like something heavy sinking
                var osc = ctx.createOscillator();
                var g = ctx.createGain();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(220, t);
                osc.frequency.exponentialRampToValueAtTime(18, t + 3.4);
                g.gain.setValueAtTime(0, t);
                g.gain.linearRampToValueAtTime(0.3, t + 0.3);
                g.gain.setValueAtTime(0.3, t + 2.8);
                g.gain.exponentialRampToValueAtTime(0.001, t + 3.4);
                osc.connect(g); g.connect(ctx.destination);
                osc.start(t); osc.stop(t + 3.5);

                // Wet dripping noise
                for (var i = 0; i < 6; i++) {
                    var drip = ctx.createOscillator();
                    var dg = ctx.createGain();
                    var df = ctx.createBiquadFilter();
                    drip.type = 'sine';
                    var start = t + 0.4 + i * 0.45;
                    var freq = 800 + Math.random() * 600;
                    drip.frequency.setValueAtTime(freq, start);
                    drip.frequency.exponentialRampToValueAtTime(freq * 0.2, start + 0.15);
                    df.type = 'bandpass'; df.frequency.value = freq * 0.6; df.Q.value = 12;
                    dg.gain.setValueAtTime(0.15, start);
                    dg.gain.exponentialRampToValueAtTime(0.001, start + 0.18);
                    drip.connect(df); df.connect(dg); dg.connect(ctx.destination);
                    drip.start(start); drip.stop(start + 0.2);
                }

                // Low rumble underneath
                var bufLen = Math.floor(ctx.sampleRate * 3.0);
                var noiseBuf = ctx.createBuffer(1, bufLen, ctx.sampleRate);
                var nd = noiseBuf.getChannelData(0);
                for (var i = 0; i < bufLen; i++) nd[i] = Math.random() * 2 - 1;
                var ns = ctx.createBufferSource();
                ns.buffer = noiseBuf;
                var nf = ctx.createBiquadFilter();
                var ng = ctx.createGain();
                nf.type = 'lowpass'; nf.frequency.value = 80;
                ng.gain.setValueAtTime(0, t);
                ng.gain.linearRampToValueAtTime(0.25, t + 1.0);
                ng.gain.setValueAtTime(0.25, t + 2.5);
                ng.gain.exponentialRampToValueAtTime(0.001, t + 3.4);
                ns.connect(nf); nf.connect(ng); ng.connect(ctx.destination);
                ns.start(t); ns.stop(t + 3.5);
            }
        </script>
