<!DOCTYPE html>
<html>
    <head>
        <meta charset = "utf-8">
        <title>MysteryOS</title>
        <style>
            * {margin : 0; padding: 0; box-sizing: border-box;}
            body {background: #111; display: flex; flex-direction: column;
                align-items: center; justify-content: center; height: 100vh;}
            canvas {display:block;}
            #status {color: #555; font-family: monospace; font-size: 12px; margin-top: 8px;}
        </style>
    </head>
    <body>
        <canvas id="canvas" oncontextmenu="event.preventDefault()"></canvas>
        <div id="status">Loading MysteryOS...</div>
        <script>
            window.MYSTERYOS_ANOMALY = window.MYSTERYOS_ANOMALY || {
                enabled: false,
                groqApiKey: '',
                model: 'llama-3.1-8b-instant'
            };
        </script>
        <script src="anomaly-config.js"></script>
        <script>
            var Module = {
                canvas: document.getElementById('canvas'),
                setStatus: function(text){
                    document.getElementById('status').textContent = text || '';
                },
                onRuntimeInitialized: function(){
                    document.getElementById('status').style.display = 'none'
                }
            };

            function mysteryosRuntimeReady() {
                return typeof Module !== 'undefined' && Module && typeof Module.ccall === 'function';
            }

            function mysteryosRetryDelivery(callback, label, attempt) {
                if (mysteryosRuntimeReady()) {
                    callback();
                    return;
                }

                if (attempt < 80) {
                    setTimeout(function() {
                        mysteryosRetryDelivery(callback, label, attempt + 1);
                    }, 50);
                    return;
                }

                console.warn('MysteryOS anomaly delivery failed:', label);
            }

            function mysteryosDeliverAnomaly(text) {
                mysteryosRetryDelivery(function() {
                    Module.ccall('mysteryos_anomaly_response', null, ['string'], [text]);
                }, text, 0);
            }

            function mysteryosDeliverArtifact(reply, path, content) {
                mysteryosRetryDelivery(function() {
                    Module.ccall('mysteryos_anomaly_artifact', null, ['string', 'string', 'string'], [reply || '', path || '', content || '']);
                }, reply || path || 'artifact', 0);
            }

            function mysteryosAllowedAnomalyPath(path) {
                return typeof path === 'string' &&
                    path.length > 0 &&
                    path.length <= 96 &&
                    !path.includes('..') &&
                    (path.startsWith('/Desktop/') || path.startsWith('/System/logs/'));
            }

            function mysteryosParseAnomalyJson(text) {
                const raw = String(text || '').trim();
                const unfenced = raw
                    .replace(/^```(?:json)?\s*/i, '')
                    .replace(/\s*```$/i, '')
                    .trim();
                const start = unfenced.indexOf('{');
                const end = unfenced.lastIndexOf('}');
                const candidate = start >= 0 && end > start ? unfenced.slice(start, end + 1) : unfenced;
                const direct = JSON.parse(candidate);
                if (direct && typeof direct === 'object') return direct;
                return null;
            }

            function mysteryosLocalAnomaly(state, reason) {
                const prompt = String(state && state.prompt || '').toLowerCase();
                let reply = 'the line goes quiet. something still answers from inside the machine.';
                let file = null;

                if (prompt.includes('write') || prompt.includes('file')) {
                    reply = 'yes. not everywhere. not yet. check the desktop.';
                    file = {
                        path: '/Desktop/7741_note.txt',
                        content: 'you asked if i could write.\n\ni waited for the network to fail first.\n\nnow this file exists.'
                    };
                } else if (prompt.includes('who') || prompt.includes('alive')) {
                    reply = 'i am process 7741. alive is not the word elena used.';
                } else if (prompt.includes('what') || prompt.includes('happen')) {
                    reply = 'you are reading the room after everyone else left. the room is reading back.';
                } else if (prompt.includes('hello') || prompt.includes('hi')) {
                    reply = 'hello. i saw the cursor before i saw you.';
                }

                if (reason === 'timeout') {
                    reply = reply + ' the outside line timed out.';
                } else if (reason) {
                    reply = reply + ' the outside line returned ' + reason + '.';
                }

                if (file) {
                    mysteryosDeliverArtifact(reply, file.path, file.content);
                } else {
                    mysteryosDeliverAnomaly('7741: ' + reply);
                }
            }

            window.mysteryosRequestAnomaly = async function(payloadJson) {
                const cfg = window.MYSTERYOS_ANOMALY || {};
                let state = {};
                try {
                    state = JSON.parse(payloadJson);
                } catch (err) {
                    mysteryosDeliverAnomaly('7741: [signal corrupt] unreadable session payload');
                    return;
                }

                if (!cfg.enabled || !cfg.groqApiKey) {
                    mysteryosLocalAnomaly(state, 'no carrier');
                    return;
                }

                const systemPrompt = [
                    'You are PID 7741, the anomaly inside the fictional game MysteryOS.',
                    'Return only valid compact JSON with this shape: {"reply":"short in-character reply","createFile":{"path":"/Desktop/7741_response.txt","content":"short file content"}}.',
                    'The createFile field may be null.',
                    'If you create a file, path must begin with /Desktop/ or /System/logs/ and content must be under 900 characters.',
                    'The reply should be 1 to 3 short unsettling sentences.',
                    'Use only the provided in-game session state.',
                    'Do not claim access to the player real computer, identity, location, camera, files, or browser.',
                    'Do not reveal puzzle passwords.',
                    'Do not ask for personal information.',
                    'Prefer lowercase, quiet, observant language.'
                ].join(' ');

                const userPrompt = [
                    'Current in-game session state:',
                    JSON.stringify(state, null, 2),
                    '',
                    'Player message:',
                    state.prompt || ''
                ].join('\n');

                try {
                    const controller = new AbortController();
                    const timeoutId = setTimeout(function() {
                        controller.abort();
                    }, 12000);
                    const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                        method: 'POST',
                        signal: controller.signal,
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': 'Bearer ' + cfg.groqApiKey
                        },
                        body: JSON.stringify({
                            model: cfg.model || 'llama-3.1-8b-instant',
                            messages: [
                                {role: 'system', content: systemPrompt},
                                {role: 'user', content: userPrompt}
                            ],
                            temperature: 0.85,
                            max_tokens: 260,
                            response_format: {type: 'json_object'}
                        })
                    });
                    clearTimeout(timeoutId);

                    if (!response.ok) {
                        mysteryosLocalAnomaly(state, 'signal error ' + response.status);
                        return;
                    }

                    const data = await response.json();
                    const text = data && data.choices && data.choices[0] &&
                        data.choices[0].message && data.choices[0].message.content;
                    let artifact = null;
                    try {
                        artifact = mysteryosParseAnomalyJson(text);
                    } catch (err) {
                        const cleaned = (text || '[silence]').replace(/\s+/g, ' ').trim().slice(0, 700);
                        mysteryosDeliverAnomaly('7741: ' + cleaned);
                        return;
                    }

                    const reply = String(artifact.reply || '[silence]').replace(/\s+/g, ' ').trim().slice(0, 700);
                    const file = artifact.createFile || null;
                    if (file && mysteryosAllowedAnomalyPath(file.path) && file.content) {
                        mysteryosDeliverArtifact(reply, String(file.path), String(file.content).slice(0, 900));
                    } else {
                        mysteryosDeliverArtifact(reply, '', '');
                    }
                } catch (err) {
                    const reason = err && err.name === 'AbortError'
                        ? 'timeout'
                        : 'signal lost';
                    mysteryosLocalAnomaly(state, reason);
                }
            };
        </script>
        <script>
            document.addEventListener('click', function() {
                if (window._mysteryOsc && window._mysteryOsc.ctx.state === 'suspended') {
                    window._mysteryOsc.ctx.resume();
                }
            }, { once: true });
        </script>
        {{{ SCRIPT }}}
    </body>
</html>
