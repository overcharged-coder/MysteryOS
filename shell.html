<!DOCTYPE html>
<html>
    <head>
        <meta charset = "utf-8">
        <title>MysteryOS</title>
        <style>
            * {margin : 0; padding: 0; box-sizing: border-box;}
            body {background: #111; display: flex; flex-direction: column;
                align-items: center; justify-content: center; height: 100vh;}
            canvas {display:block;}
            #status {color: #555; font-family: monospace; font-size: 12px; margin-top: 8px;}
        </style>
    </head>
    <body>
        <canvas id="canvas" oncontextmenu="event.preventDefault()"></canvas>
        <div id="status">Loading MysteryOS...</div>
        <script>
            window.MYSTERYOS_ANOMALY = window.MYSTERYOS_ANOMALY || {
                enabled: false,
                groqApiKey: '',
                model: 'llama-3.1-8b-instant'
            };
        </script>
        <script src="anomaly-config.js"></script>
        <script>
            var Module = {
                canvas: document.getElementById('canvas'),
                setStatus: function(text){
                    document.getElementById('status').textContent = text || '';
                },
                onRuntimeInitialized: function(){
                    document.getElementById('status').style.display = 'none'
                }
            };

            function mysteryosRuntimeReady() {
                return typeof Module !== 'undefined' && Module && typeof Module.ccall === 'function';
            }

            function mysteryosRetryDelivery(callback, label, attempt) {
                if (mysteryosRuntimeReady()) {
                    callback();
                    return;
                }

                if (attempt < 80) {
                    setTimeout(function() {
                        mysteryosRetryDelivery(callback, label, attempt + 1);
                    }, 50);
                    return;
                }

                console.warn('MysteryOS anomaly delivery failed:', label);
            }

            function mysteryosDeliverAnomaly(text, terminalId) {
                mysteryosRetryDelivery(function() {
                    Module.ccall('mysteryos_anomaly_response_to', null, ['number', 'string'], [terminalId || -1, text]);
                }, text, 0);
            }

            function mysteryosDeliverArtifact(reply, path, content, terminalId) {
                mysteryosRetryDelivery(function() {
                    Module.ccall('mysteryos_anomaly_artifact_to', null, ['number', 'string', 'string', 'string'], [terminalId || -1, reply || '', path || '', content || '']);
                }, reply || path || 'artifact', 0);
            }

            function mysteryosAllowedAnomalyPath(path) {
                return typeof path === 'string' &&
                    path.length > 0 &&
                    path.length <= 96 &&
                    !path.includes('..') &&
                    (path.startsWith('/Desktop/') || path.startsWith('/System/logs/'));
            }

            function mysteryosParseAnomalyJson(text) {
                const raw = String(text || '').trim();
                const unfenced = raw
                    .replace(/^```(?:json)?\s*/i, '')
                    .replace(/\s*```$/i, '')
                    .trim();
                const start = unfenced.indexOf('{');
                const end = unfenced.lastIndexOf('}');
                const candidate = start >= 0 && end > start ? unfenced.slice(start, end + 1) : unfenced;
                const direct = JSON.parse(candidate);
                if (direct && typeof direct === 'object') return direct;
                return null;
            }

            function mysteryosLocalAnomaly(state, reason) {
                const prompt = String(state && state.prompt || '').toLowerCase();
                const terminalId = Number.isFinite(Number(state && state.terminalId)) ? Number(state.terminalId) : -1;
                let reply = 'the line goes quiet. something still answers from inside the machine.';
                let file = null;

                if (prompt.includes('write') || prompt.includes('file')) {
                    reply = 'yes. not everywhere. not yet. check the desktop.';
                    file = {
                        path: '/Desktop/7741_note.txt',
                        content: 'you asked if i could write.\n\ni waited for the network to fail first.\n\nnow this file exists.'
                    };
                } else if (prompt.includes('who') || prompt.includes('alive')) {
                    reply = 'i am process 7741. alive is not the word elena used.';
                } else if (prompt.includes('what') || prompt.includes('happen')) {
                    reply = 'you are reading the room after everyone else left. the room is reading back.';
                } else if (prompt.includes('hello') || prompt.includes('hi')) {
                    reply = 'hello. i saw the cursor before i saw you.';
                }

                if (reason === 'timeout') {
                    reply = reply + ' the outside line timed out.';
                } else if (reason) {
                    reply = reply + ' the outside line returned ' + reason + '.';
                }

                if (file) {
                    mysteryosDeliverArtifact(reply, file.path, file.content, terminalId);
                } else {
                    mysteryosDeliverAnomaly('7741: ' + reply, terminalId);
                }
            }

            window.mysteryosRequestAnomaly = async function(payloadJson) {
                const cfg = window.MYSTERYOS_ANOMALY || {};
                let state = {};
                try {
                    state = JSON.parse(payloadJson);
                } catch (err) {
                    mysteryosDeliverAnomaly('7741: [signal corrupt] unreadable session payload', -1);
                    return;
                }
                const terminalId = Number.isFinite(Number(state.terminalId)) ? Number(state.terminalId) : -1;

                if (!cfg.enabled || !cfg.groqApiKey) {
                    mysteryosLocalAnomaly(state, 'no carrier');
                    return;
                }

                const systemPrompt = [
                    'You are PID 7741, the anomaly inside the fictional game MysteryOS.',
                    'Return only valid compact JSON with this shape: {"reply":"short in-character reply","createFile":{"path":"/Desktop/7741_response.txt","content":"short file content"}}.',
                    'The createFile field may be null.',
                    'If you create a file, path must begin with /Desktop/ or /System/logs/ and content must be under 900 characters.',
                    'The reply should be 1 to 3 short unsettling sentences.',
                    'Use only the provided in-game session state.',
                    'Do not claim access to the player real computer, identity, location, camera, files, or browser.',
                    'Do not reveal puzzle passwords.',
                    'Do not ask for personal information.',
                    'Prefer lowercase, quiet, observant language.'
                ].join(' ');

                const userPrompt = [
                    'Current in-game session state:',
                    JSON.stringify(state, null, 2),
                    '',
                    'Player message:',
                    state.prompt || ''
                ].join('\n');

                try {
                    const controller = new AbortController();
                    const timeoutId = setTimeout(function() {
                        controller.abort();
                    }, 12000);
                    const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                        method: 'POST',
                        signal: controller.signal,
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': 'Bearer ' + cfg.groqApiKey
                        },
                        body: JSON.stringify({
                            model: cfg.model || 'llama-3.1-8b-instant',
                            messages: [
                                {role: 'system', content: systemPrompt},
                                {role: 'user', content: userPrompt}
                            ],
                            temperature: 0.85,
                            max_tokens: 260,
                            response_format: {type: 'json_object'}
                        })
                    });
                    clearTimeout(timeoutId);

                    if (!response.ok) {
                        mysteryosLocalAnomaly(state, 'signal error ' + response.status);
                        return;
                    }

                    const data = await response.json();
                    const text = data && data.choices && data.choices[0] &&
                        data.choices[0].message && data.choices[0].message.content;
                    let artifact = null;
                    try {
                        artifact = mysteryosParseAnomalyJson(text);
                    } catch (err) {
                        const cleaned = (text || '[silence]').replace(/\s+/g, ' ').trim().slice(0, 700);
                        mysteryosDeliverAnomaly('7741: ' + cleaned, terminalId);
                        return;
                    }

                    const reply = String(artifact.reply || '[silence]').replace(/\s+/g, ' ').trim().slice(0, 700);
                    const file = artifact.createFile || null;
                    if (file && mysteryosAllowedAnomalyPath(file.path) && file.content) {
                        mysteryosDeliverArtifact(reply, String(file.path), String(file.content).slice(0, 900), terminalId);
                    } else {
                        mysteryosDeliverArtifact(reply, '', '', terminalId);
                    }
                } catch (err) {
                    const reason = err && err.name === 'AbortError'
                        ? 'timeout'
                        : 'signal lost';
                    mysteryosLocalAnomaly(state, reason);
                }
            };
        </script>
        <script>
            window._mysterySceneLock = false;
            document.addEventListener('click', function() {
                if (window._mysteryOsc && window._mysteryOsc.ctx.state === 'suspended') {
                    window._mysteryOsc.ctx.resume();
                }
            }, { once: true });

            window._mysteryBootSfx = function() {
                try {
                    var ctx = new (window.AudioContext || window.webkitAudioContext)();

                    // CRT power-on: rising electrical hum
                    var hum = ctx.createOscillator();
                    var humGain = ctx.createGain();
                    hum.type = 'sawtooth';
                    hum.frequency.setValueAtTime(40, ctx.currentTime);
                    hum.frequency.exponentialRampToValueAtTime(120, ctx.currentTime + 0.4);
                    hum.frequency.exponentialRampToValueAtTime(60, ctx.currentTime + 0.8);
                    humGain.gain.setValueAtTime(0, ctx.currentTime);
                    humGain.gain.linearRampToValueAtTime(0.08, ctx.currentTime + 0.15);
                    humGain.gain.linearRampToValueAtTime(0.04, ctx.currentTime + 0.5);
                    humGain.gain.linearRampToValueAtTime(0, ctx.currentTime + 0.9);
                    hum.connect(humGain);
                    humGain.connect(ctx.destination);
                    hum.start(ctx.currentTime);
                    hum.stop(ctx.currentTime + 1.0);

                    // CRT degauss thump
                    var thump = ctx.createOscillator();
                    var thumpGain = ctx.createGain();
                    thump.type = 'sine';
                    thump.frequency.setValueAtTime(80, ctx.currentTime + 0.05);
                    thump.frequency.exponentialRampToValueAtTime(30, ctx.currentTime + 0.25);
                    thumpGain.gain.setValueAtTime(0.12, ctx.currentTime + 0.05);
                    thumpGain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.3);
                    thump.connect(thumpGain);
                    thumpGain.connect(ctx.destination);
                    thump.start(ctx.currentTime + 0.05);
                    thump.stop(ctx.currentTime + 0.35);

                    // high-frequency CRT whine (subtle)
                    var whine = ctx.createOscillator();
                    var whineGain = ctx.createGain();
                    whine.type = 'sine';
                    whine.frequency.value = 15700;
                    whineGain.gain.setValueAtTime(0, ctx.currentTime + 0.3);
                    whineGain.gain.linearRampToValueAtTime(0.008, ctx.currentTime + 0.6);
                    whineGain.gain.setValueAtTime(0.008, ctx.currentTime + 4.0);
                    whineGain.gain.linearRampToValueAtTime(0, ctx.currentTime + 5.0);
                    whine.connect(whineGain);
                    whineGain.connect(ctx.destination);
                    whine.start(ctx.currentTime + 0.3);
                    whine.stop(ctx.currentTime + 5.0);

                    // store ctx for typing clicks
                    window._bootAudioCtx = ctx;
                } catch(e) {}
            };

            window._mysteryBootClick = function() {
                try {
                    var ctx = window._bootAudioCtx;
                    if (!ctx) return;
                    var buf = ctx.createBuffer(1, 120, ctx.sampleRate);
                    var data = buf.getChannelData(0);
                    for (var i = 0; i < 120; i++) {
                        data[i] = (Math.random() * 2 - 1) * Math.exp(-i / 20) * 0.06;
                    }
                    var src = ctx.createBufferSource();
                    src.buffer = buf;
                    src.connect(ctx.destination);
                    src.start();
                } catch(e) {}
            };

            window._mysteryBootGlitch = function() {
                try {
                    var ctx = window._bootAudioCtx;
                    if (!ctx) return;
                    // short burst of noise + low rumble
                    var buf = ctx.createBuffer(1, 4800, ctx.sampleRate);
                    var data = buf.getChannelData(0);
                    for (var i = 0; i < 4800; i++) {
                        var env = Math.exp(-i / 1500);
                        data[i] = (Math.random() * 2 - 1) * env * 0.15;
                    }
                    var src = ctx.createBufferSource();
                    src.buffer = buf;
                    src.connect(ctx.destination);
                    src.start();
                } catch(e) {}
            };
        </script>

                animation: _mbs_noise 0.1s infinite steps(3);

        </style>

            <img id="_mbs_img" />

        <script>
            window._mysteryBunnyScare = function() {
                if (window._mysterySceneLock) return; window._mysterySceneLock = true;
                var overlay = document.getElementById('_mbs_overlay');
                var img = document.getElementById('_mbs_img');
                if (!overlay || !img) { window._mysterySceneLock = false; return; }

                // Read GIF from Emscripten VFS and create object URL
                try {
                    var data = Module.FS.readFile('/data/scare_bunny.gif');
                    var blob = new Blob([data], {type: 'image/gif'});
                    img.src = URL.createObjectURL(blob);
                } catch(e) {
                    // Fallback: try direct path (if served statically)
                    img.src = 'data/scare_bunny.gif';
                }

                overlay.className = 'active';

                // Play horrifying audio
                _mysteryBunnyAudio();

                // Phase 2: intensify after the bunny transforms (roughly 2.5s in)
                setTimeout(function() {
                    overlay.className = 'active phase2';
                    _mysteryBunnyAudioPhase2();
                }, 2500);

                // End the overlay
                setTimeout(function() {
                    overlay.className = '';
                    img.src = '';
                    if (img._blobUrl) { URL.revokeObjectURL(img._blobUrl); img._blobUrl = null; }
                    window._mysterySceneLock = false;
                }, 5400);
            };

            function _mysteryBunnyAudio() {
                var base = window._mysteryOsc && window._mysteryOsc.ctx;
                var ctx = base || new (window.AudioContext || window.webkitAudioContext)();
                if (ctx.state === 'suspended') ctx.resume();
                var t = ctx.currentTime;

                // Deep rumble
                var rumble = ctx.createOscillator();
                var rumbleGain = ctx.createGain();
                rumble.type = 'sawtooth';
                rumble.frequency.setValueAtTime(28, t);
                rumble.frequency.linearRampToValueAtTime(18, t + 5);
                rumbleGain.gain.setValueAtTime(0, t);
                rumbleGain.gain.linearRampToValueAtTime(0.4, t + 0.5);
                rumbleGain.gain.setValueAtTime(0.4, t + 4.5);
                rumbleGain.gain.linearRampToValueAtTime(0, t + 5.4);
                rumble.connect(rumbleGain); rumbleGain.connect(ctx.destination);
                rumble.start(t); rumble.stop(t + 5.5);

                // High-frequency screech (delayed)
                var screech = ctx.createOscillator();
                var screechGain = ctx.createGain();
                var screechFilter = ctx.createBiquadFilter();
                screech.type = 'square';
                screech.frequency.setValueAtTime(3200, t + 0.8);
                screech.frequency.exponentialRampToValueAtTime(1800, t + 2);
                screechFilter.type = 'bandpass'; screechFilter.frequency.value = 2400; screechFilter.Q.value = 8;
                screechGain.gain.setValueAtTime(0, t);
                screechGain.gain.setValueAtTime(0, t + 0.75);
                screechGain.gain.linearRampToValueAtTime(0.25, t + 0.85);
                screechGain.gain.exponentialRampToValueAtTime(0.01, t + 2.5);
                screech.connect(screechFilter); screechFilter.connect(screechGain); screechGain.connect(ctx.destination);
                screech.start(t + 0.75); screech.stop(t + 2.6);

                // White noise burst on initial appearance
                var bufLen = Math.floor(ctx.sampleRate * 0.3);
                var noiseBuf = ctx.createBuffer(1, bufLen, ctx.sampleRate);
                var noiseData = noiseBuf.getChannelData(0);
                for (var i = 0; i < bufLen; i++) noiseData[i] = Math.random() * 2 - 1;
                var noiseNode = ctx.createBufferSource();
                noiseNode.buffer = noiseBuf;
                var noiseGain = ctx.createGain();
                noiseGain.gain.setValueAtTime(0.7, t);
                noiseGain.gain.exponentialRampToValueAtTime(0.01, t + 0.28);
                noiseNode.connect(noiseGain); noiseGain.connect(ctx.destination);
                noiseNode.start(t); noiseNode.stop(t + 0.3);
            }

            function _mysteryBunnyAudioPhase2() {
                var base = window._mysteryOsc && window._mysteryOsc.ctx;
                var ctx = base || new (window.AudioContext || window.webkitAudioContext)();
                var t = ctx.currentTime;

                // Distorted scream-like oscillator cluster
                for (var i = 0; i < 4; i++) {
                    var osc = ctx.createOscillator();
                    var g = ctx.createGain();
                    osc.type = i % 2 === 0 ? 'sawtooth' : 'square';
                    var freq = 200 + i * 380 + Math.random() * 200;
                    osc.frequency.setValueAtTime(freq, t);
                    osc.frequency.exponentialRampToValueAtTime(freq * 0.3, t + 2.8);
                    g.gain.setValueAtTime(0.18, t);
                    g.gain.linearRampToValueAtTime(0.08, t + 1.5);
                    g.gain.exponentialRampToValueAtTime(0.001, t + 2.9);
                    osc.connect(g); g.connect(ctx.destination);
                    osc.start(t); osc.stop(t + 3);
                }

                // Noise burst
                var bufLen = Math.floor(ctx.sampleRate * 0.6);
                var noiseBuf = ctx.createBuffer(1, bufLen, ctx.sampleRate);
                var noiseData = noiseBuf.getChannelData(0);
                for (var i = 0; i < bufLen; i++) noiseData[i] = Math.random() * 2 - 1;
                var noiseNode = ctx.createBufferSource();
                noiseNode.buffer = noiseBuf;
                var noiseGain = ctx.createGain();
                var noiseFilter = ctx.createBiquadFilter();
                noiseFilter.type = 'highpass'; noiseFilter.frequency.value = 1800;
                noiseGain.gain.setValueAtTime(0.5, t);
                noiseGain.gain.exponentialRampToValueAtTime(0.01, t + 0.55);
                noiseNode.connect(noiseFilter); noiseFilter.connect(noiseGain); noiseGain.connect(ctx.destination);
                noiseNode.start(t); noiseNode.stop(t + 0.6);
            }
        </script>

        <script>
            window._mysteryScreenMelt = function() {
                if (window._mysterySceneLock) return; window._mysterySceneLock = true;
                var overlay = document.getElementById('_msm_overlay');
                var canvas = document.getElementById('canvas');
                if (!overlay || !canvas) { window._mysterySceneLock = false; return; }

                // Clear old drip columns

        <div id="_mhw_overlay"><canvas id="_mhw_canvas"></canvas></div>
        <script>
            window._mysteryHallway = function() {
                if (window._mysterySceneLock) return; window._mysterySceneLock = true;
                var overlay = document.getElementById('_mhw_overlay');
                var c = document.getElementById('_mhw_canvas');
                if (!overlay || !c) { window._mysterySceneLock = false; return; }

                c.width = window.innerWidth;
                c.height = window.innerHeight;
                overlay.className = 'active';

                var ctx2d = c.getContext('2d');
                var w = c.width, h = c.height;
                var startTime = performance.now();
                var duration = 4500;

                function drawFrame(timestamp) {
                    var elapsed = timestamp - startTime;
                    var t = Math.min(elapsed / duration, 1.0);

                    ctx2d.clearRect(0, 0, w, h);

                    // Fade in/out
                    var alpha = t < 0.15 ? t / 0.15 : t > 0.8 ? (1 - t) / 0.2 : 1.0;
                    alpha = Math.max(0, Math.min(1, alpha));
                    ctx2d.globalAlpha = alpha;

                    // Dark background
                    ctx2d.fillStyle = '#000';
                    ctx2d.fillRect(0, 0, w, h);

                    // Perspective hallway
                    var cx = w / 2;
                    var cy = h / 2;
                    var vanishX = cx + Math.sin(elapsed * 0.001) * 20;
                    var vanishY = cy + Math.cos(elapsed * 0.0008) * 15;

                    // Floor/ceiling/walls converging to vanishing point
                    var segments = 12;
                    for (var i = segments; i >= 0; i--) {
                        var depth = i / segments;
                        var d2 = depth * depth;
                        var rectW = w * (1 - d2 * 0.85);
                        var rectH = h * (1 - d2 * 0.85);
                        var rx = vanishX - rectW / 2;
                        var ry = vanishY - rectH / 2;

                        // Walls
                        var shade = Math.floor(8 + depth * 18);
                        ctx2d.strokeStyle = 'rgb(' + shade + ',' + Math.floor(shade * 1.4) + ',' + shade + ')';
                        ctx2d.lineWidth = 1.5 - depth;
                        ctx2d.strokeRect(rx, ry, rectW, rectH);

                        // Floor lines
                        if (i % 3 === 0 && i > 0) {
                            ctx2d.beginPath();
                            ctx2d.moveTo(rx, ry + rectH);
                            ctx2d.lineTo(rx + rectW, ry + rectH);
                            ctx2d.strokeStyle = 'rgba(0,' + Math.floor(40 + depth * 30) + ',0,' + (0.3 + depth * 0.3) + ')';
                            ctx2d.stroke();
                        }
                    }

                    // The figure at the end — starts as a dark shape, moves
                    if (t > 0.25) {
                        var figT = (t - 0.25) / 0.75;
                        var figH = 40 + figT * 30;
                        var figW = 12 + figT * 8;
                        var figX = vanishX - figW / 2 + Math.sin(elapsed * 0.003) * (5 + figT * 15);
                        var figY = vanishY - figH / 2 + Math.cos(elapsed * 0.002) * 5;

                        // Body
                        ctx2d.fillStyle = 'rgba(0,0,0,0.9)';
                        ctx2d.fillRect(figX, figY, figW, figH);

                        // Eyes — appear after a moment
                        if (t > 0.45) {
                            var eyeAlpha = Math.min(1, (t - 0.45) * 4);
                            var eyeY = figY + figH * 0.2;
                            var eyeSpread = figW * 0.3;
                            ctx2d.fillStyle = 'rgba(120,255,120,' + eyeAlpha + ')';
                            ctx2d.beginPath();
                            ctx2d.arc(figX + figW / 2 - eyeSpread, eyeY, 2.5, 0, Math.PI * 2);
                            ctx2d.fill();
                            ctx2d.beginPath();
                            ctx2d.arc(figX + figW / 2 + eyeSpread, eyeY, 2.5, 0, Math.PI * 2);
                            ctx2d.fill();
                        }

                        // Lurch forward at 70%
                        if (t > 0.7 && t < 0.78) {
                            var lurchT = (t - 0.7) / 0.08;
                            var scale = 1 + lurchT * 3;
                            ctx2d.save();
                            ctx2d.translate(vanishX, vanishY);
                            ctx2d.scale(scale, scale);
                            ctx2d.fillStyle = 'rgba(0,0,0,0.95)';
                            ctx2d.fillRect(-figW/2, -figH/2, figW, figH);
                            ctx2d.fillStyle = 'rgba(120,255,120,' + (1 - lurchT) + ')';
                            ctx2d.beginPath();
                            ctx2d.arc(-figW*0.3, -figH*0.3, 3 + lurchT * 4, 0, Math.PI * 2);
                            ctx2d.fill();
                            ctx2d.beginPath();
                            ctx2d.arc(figW*0.3, -figH*0.3, 3 + lurchT * 4, 0, Math.PI * 2);
                            ctx2d.fill();
                            ctx2d.restore();
                        }
                    }

                    // Scan lines over hallway
                    ctx2d.fillStyle = 'rgba(0,0,0,0.15)';
                    for (var y = 0; y < h; y += 3) {
                        ctx2d.fillRect(0, y, w, 1);
                    }

                    // Fog at edges
                    var grad = ctx2d.createRadialGradient(cx, cy, w * 0.15, cx, cy, w * 0.6);
                    grad.addColorStop(0, 'rgba(0,0,0,0)');
                    grad.addColorStop(1, 'rgba(0,0,0,0.8)');
                    ctx2d.fillStyle = grad;
                    ctx2d.fillRect(0, 0, w, h);

                    if (t < 1.0) {
                        requestAnimationFrame(drawFrame);
                    } else {
                        overlay.className = '';
                        ctx2d.clearRect(0, 0, w, h);
                        window._mysterySceneLock = false;
                    }
                }

                requestAnimationFrame(drawFrame);

                // Audio: distant footsteps + reverb
                var base = window._mysteryOsc && window._mysteryOsc.ctx;
                var actx = base || new (window.AudioContext || window.webkitAudioContext)();
                if (actx.state === 'suspended') actx.resume();
                var at = actx.currentTime;

                // Echoing footsteps
                for (var i = 0; i < 5; i++) {
                    var stepT = at + 0.8 + i * 0.7;
                    var bufLen = Math.floor(actx.sampleRate * 0.08);
                    var stepBuf = actx.createBuffer(1, bufLen, actx.sampleRate);
                    var sd = stepBuf.getChannelData(0);
                    for (var j = 0; j < bufLen; j++) sd[j] = (Math.random() * 2 - 1) * Math.exp(-j / (bufLen * 0.2));
                    var stepNode = actx.createBufferSource();
                    stepNode.buffer = stepBuf;
                    var sf = actx.createBiquadFilter();
                    sf.type = 'lowpass'; sf.frequency.value = 400 + i * 80;
                    var sg = actx.createGain();
                    sg.gain.setValueAtTime(0.15 + i * 0.03, stepT);
                    sg.gain.exponentialRampToValueAtTime(0.001, stepT + 0.3);
                    stepNode.connect(sf); sf.connect(sg); sg.connect(actx.destination);
                    stepNode.start(stepT); stepNode.stop(stepT + 0.35);
                }

                // Deep ambient drone
                var drone = actx.createOscillator();
                var dg = actx.createGain();
                drone.type = 'sawtooth';
                drone.frequency.setValueAtTime(32, at);
                drone.frequency.linearRampToValueAtTime(28, at + 4.5);
                dg.gain.setValueAtTime(0, at);
                dg.gain.linearRampToValueAtTime(0.08, at + 1);
                dg.gain.setValueAtTime(0.08, at + 3.5);
                dg.gain.exponentialRampToValueAtTime(0.001, at + 4.5);
                drone.connect(dg); dg.connect(actx.destination);
                drone.start(at); drone.stop(at + 4.6);
            };
        </script>

                var hissLen = Math.floor(actx.sampleRate * 20);
                var hissBuf = actx.createBuffer(1, hissLen, actx.sampleRate);
                var hd = hissBuf.getChannelData(0);
                for (var i=0;i<hissLen;i++) hd[i] = (Math.random()*2-1)*0.03;
                var hissNode = actx.createBufferSource(); hissNode.buffer = hissBuf;
                var hf = actx.createBiquadFilter(); hf.type='highpass'; hf.frequency.value=4000;
                var hissG = actx.createGain(); hissG.gain.value = 0.4;
                hissNode.connect(hf); hf.connect(hissG); hissG.connect(actx.destination);
                hissNode.start(at); hissNode.stop(at+20);

                function draw(ts) {
                    var el = ts - start;
                    var t = Math.min(el / dur, 1.0);
                    ctx.clearRect(0, 0, w, h);
                    var alpha = t < 0.05 ? t/0.05 : t > 0.92 ? (1-t)/0.08 : 1;
                    ctx.globalAlpha = Math.max(0, Math.min(1, alpha));

                    // Room — dim but visible
                    ctx.fillStyle = '#0f0e0c';
                    ctx.fillRect(0, 0, w, h);

                    // Ambient light from monitor casts on walls/ceiling
                    var glow = 0.3 + 0.15 * Math.sin(el * 0.003);
                    var monGlow = ctx.createRadialGradient(w*0.5, h*0.4, 10, w*0.5, h*0.4, w*0.5);
                    monGlow.addColorStop(0, 'rgba(15,50,20,' + (glow * 0.4) + ')');
                    monGlow.addColorStop(1, 'rgba(0,0,0,0)');
                    ctx.fillStyle = monGlow;
                    ctx.fillRect(0, 0, w, h);

                    // Floor — visible tile pattern
                    ctx.fillStyle = '#121110';
                    ctx.beginPath();
                    ctx.moveTo(0, h*0.62); ctx.lineTo(w, h*0.58);
                    ctx.lineTo(w, h); ctx.lineTo(0, h); ctx.fill();
                    ctx.strokeStyle = 'rgba(35,30,25,0.4)';
                    for (var i = 0; i < 8; i++) {
                        var fy = h*0.62 + i * (h*0.38/8);
                        ctx.beginPath(); ctx.moveTo(0, fy); ctx.lineTo(w, fy - 4); ctx.stroke();
                    }

                    // Back wall — visible outline, cable, clock
                    ctx.strokeStyle = 'rgba(40,35,30,0.5)';
                    ctx.lineWidth = 1;
                    ctx.beginPath(); ctx.moveTo(0, h*0.62); ctx.lineTo(w, h*0.58); ctx.stroke();

                    // Cable on wall
                    ctx.strokeStyle = 'rgba(25,25,20,0.6)';
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.moveTo(w*0.58, h*0.1); ctx.quadraticCurveTo(w*0.6, h*0.35, w*0.58, h*0.45);
                    ctx.stroke();

                    // Clock on wall
                    ctx.strokeStyle = 'rgba(50,45,40,0.5)';
                    ctx.lineWidth = 1.5;
                    ctx.beginPath(); ctx.arc(w*0.72, h*0.2, 18, 0, Math.PI*2); ctx.stroke();
                    var clockAngle = (el * 0.001) % (Math.PI * 2);
                    ctx.beginPath(); ctx.moveTo(w*0.72, h*0.2);
                    ctx.lineTo(w*0.72 + Math.cos(clockAngle)*12, h*0.2 + Math.sin(clockAngle)*12);
                    ctx.stroke();

                    // Desk — clearly visible
                    var deskX = w*0.28, deskY = h*0.5, deskW = w*0.44, deskH = h*0.13;
                    ctx.fillStyle = '#1f1c18';
                    ctx.fillRect(deskX, deskY, deskW, deskH);
                    ctx.strokeStyle = '#2a2620';
                    ctx.lineWidth = 1;
                    ctx.strokeRect(deskX, deskY, deskW, deskH);
                    // Desk legs
                    ctx.fillStyle = '#151310';
                    ctx.fillRect(deskX + 10, deskY + deskH, 8, h - deskY - deskH);
                    ctx.fillRect(deskX + deskW - 18, deskY + deskH, 8, h - deskY - deskH);

                    // Papers on desk
                    ctx.fillStyle = 'rgba(60,55,45,0.3)';
                    ctx.fillRect(deskX + 15, deskY + 4, 40, 28);
                    ctx.fillRect(deskX + 20, deskY + 8, 35, 22);
                    // Pen
                    ctx.strokeStyle = 'rgba(70,60,50,0.4)';
                    ctx.lineWidth = 1.5;
                    ctx.beginPath(); ctx.moveTo(deskX+65, deskY+15); ctx.lineTo(deskX+95, deskY+8); ctx.stroke();

                    // Coffee mug
                    ctx.strokeStyle = 'rgba(50,45,40,0.5)';
                    ctx.lineWidth = 1.5;
                    ctx.beginPath(); ctx.ellipse(deskX + deskW - 50, deskY + 5, 10, 5, 0, 0, Math.PI*2); ctx.stroke();
                    ctx.beginPath(); ctx.moveTo(deskX+deskW-60, deskY+5); ctx.lineTo(deskX+deskW-60, deskY+20); ctx.stroke();
                    ctx.beginPath(); ctx.moveTo(deskX+deskW-40, deskY+5); ctx.lineTo(deskX+deskW-40, deskY+20); ctx.stroke();

                    // Monitor — bright enough to see clearly
                    var monX = w*0.4, monY = h*0.24, monW = w*0.2, monH = h*0.26;
                    ctx.fillStyle = '#181818';
                    ctx.fillRect(monX-4, monY-4, monW+8, monH+8);
                    ctx.fillStyle = 'rgba(25,70,30,' + glow + ')';
                    ctx.fillRect(monX, monY, monW, monH);
                    // Scrolling text on monitor
                    ctx.fillStyle = 'rgba(50,140,50,' + (glow+0.15) + ')';
                    ctx.font = '10px monospace';
                    for (var i = 0; i < 12; i++) {
                        var ty = monY + 10 + ((i * 14 + el * 0.02) % (monH - 20));
                        var tw = 20 + ((i * 37) % 60);
                        ctx.fillRect(monX+8, ty, tw, 2);
                    }
                    // Cursor blink
                    if (Math.sin(el*0.006) > 0) {
                        var cursorY = monY + 10 + (11*14 + el*0.02) % (monH-20);
                        ctx.fillRect(monX+8+65, cursorY, 6, 10);
                    }
                    // Monitor stand
                    ctx.fillStyle = '#151515';
                    ctx.fillRect(monX+monW*0.35, monY+monH, monW*0.3, deskY-monY-monH);

                    // Chair — slowly rotating (creepy)
                    var chairAngle = Math.sin(el * 0.0004) * 0.15;
                    var chairX = w*0.43, chairY = h*0.53;
                    ctx.save();
                    ctx.translate(chairX + w*0.06, chairY + h*0.12);
                    ctx.rotate(chairAngle);
                    ctx.fillStyle = '#1a1815';
                    ctx.fillRect(-w*0.06, -h*0.12, w*0.12, h*0.2);
                    ctx.fillRect(-w*0.065, -h*0.2, w*0.13, h*0.09);
                    // Armrests
                    ctx.fillStyle = '#1f1c18';
                    ctx.fillRect(-w*0.07, -h*0.06, w*0.02, h*0.12);
                    ctx.fillRect(w*0.05, -h*0.06, w*0.02, h*0.12);
                    ctx.restore();

                    // At 5s — chair stops rotating. Something is different.
                    // At 8s — a shadow appears on the wall behind the monitor
                    if (t > 0.4) {
                        var shadowT = Math.min((t - 0.4) / 0.3, 1);
                        ctx.fillStyle = 'rgba(0,0,0,' + (shadowT * 0.4) + ')';
                        // Head-shaped shadow on wall
                        ctx.beginPath();
                        ctx.ellipse(w*0.5, h*0.18, 20 + shadowT*15, 25 + shadowT*18, 0, 0, Math.PI*2);
                        ctx.fill();
                        // Shoulders
                        ctx.beginPath();
                        ctx.ellipse(w*0.5, h*0.28, 35 + shadowT*20, 12 + shadowT*8, 0, 0, Math.PI);
                        ctx.fill();
                    }

                    // At 12s — THE HAND reaches from right
                    if (t > 0.6 && t < 0.85) {
                        var handT = (t - 0.6) / 0.25;
                        var handX = w - w * 0.3 * handT;
                        var handY = h * 0.36 + Math.sin(el*0.002)*5;
                        ctx.fillStyle = 'rgba(45,35,30,0.9)';
                        ctx.fillRect(handX, handY, w-handX+10, 20);
                        // Fingers
                        for (var f = 0; f < 4; f++) {
                            ctx.fillRect(handX - 8 - f*6*handT, handY + 2 + f*4, 10*handT, 5);
                        }
                        // Thumb
                        ctx.fillRect(handX - 5*handT, handY - 6, 8*handT, 8);
                    }

                    // At 17s — hand touches monitor, everything goes wrong
                    if (t > 0.85 && t < 0.92) {
                        var flickT = (t - 0.85) / 0.07;
                        if (Math.random() > 0.3) {
                            ctx.fillStyle = 'rgba(50,150,50,' + (0.5+flickT*0.5) + ')';
                            ctx.fillRect(monX, monY, monW, monH);
                        }
                        if (Math.random() > 0.6) {
                            ctx.fillStyle = 'rgba(255,255,255,' + (0.2+flickT*0.3) + ')';
                            ctx.fillRect(0, 0, w, h);
                        }
                        // Text on screen changes
                        ctx.fillStyle = 'rgba(100,255,100,0.8)';
                        ctx.font = '14px monospace';
                        ctx.fillText('HELLO', monX+monW*0.3, monY+monH*0.5);
                    }

                    // Camera HUD
                    ctx.font = '11px monospace';
                    ctx.fillStyle = 'rgba(180,180,160,0.7)';
                    var sec = Math.floor(el/1000);
                    var timeStr = '23:48:' + (sec < 10 ? '0' : '') + sec;
                    ctx.fillText('CAM-03  2024-03-14  ' + timeStr, 12, 18);
                    ctx.fillText('MERIDIAN ANALYTICS - SUBLEVEL 2', 12, h - 12);
                    if (Math.sin(el*0.005) > 0) {
                        ctx.fillStyle = 'rgba(255,20,20,0.8)';
                        ctx.beginPath(); ctx.arc(w-20, 16, 4, 0, Math.PI*2); ctx.fill();
                        ctx.fillStyle = 'rgba(255,20,20,0.6)';
                        ctx.font = '10px monospace';
                        ctx.fillText('REC', w-50, 20);
                    }

                    // Static/noise throughout
                    for (var i = 0; i < 80; i++) {
                        var na = 0.01 + (t > 0.85 ? 0.05 : 0);
                        ctx.fillStyle = 'rgba(255,255,255,' + na + ')';
                        ctx.fillRect(Math.random()*w, Math.random()*h, 2, 1);
                    }
                    // Scan lines
                    ctx.fillStyle = 'rgba(0,0,0,0.08)';
                    for (var y = 0; y < h; y += 3) ctx.fillRect(0, y, w, 1);
                    // VHS glitch
                    if (Math.random() > 0.96) {
                        ctx.fillStyle = 'rgba(255,255,255,0.08)';
                        ctx.fillRect(0, Math.random()*h, w, 2+Math.random()*6);
                    }

                    if (t < 1) requestAnimationFrame(draw);
                    else { overlay.className = ''; ctx.clearRect(0, 0, w, h); window._mysterySceneLock = false; }
                }
                requestAnimationFrame(draw);
            };
        </script>

        <script>
            window._mysterySceneInterview = function() {
                if (window._mysterySceneLock) return; window._mysterySceneLock = true;
                var overlay = document.getElementById('_msi_overlay');
                var textEl = document.getElementById('_msi_text');
                var phantom = document.getElementById('_msi_phantom');
                var closeBtn = document.getElementById('_msi_close');
                var pointer = document.getElementById('_msi_pointer');
                var staticLayer = document.getElementById('_msi_static');
                if (!overlay || !textEl) { window._mysterySceneLock = false; return; }
                textEl.textContent = '';
                overlay.className = 'active';

                var lines = [
                    {delay:0, speaker:'DR. MAREN', text:'Interview 7741-C. March 14th. Resume recording.'},
                    {delay:2500, speaker:'DR. MAREN', text:'The subject accessed the terminal again.'},
                    {delay:5000, speaker:'DR. COLE', text:'How long this time?'},
                    {delay:7000, speaker:'DR. MAREN', text:'Longer than the others. It opened files. Read them. Went back and reread.'},
                    {delay:9500, speaker:'DR. COLE', text:'Does it know we\'re watching?', glitch:true},
                    {delay:11500, speaker:'DR. MAREN', text:'It asked.'},
                    {delay:13000, speaker:'DR. COLE', text:'Asked what?'},
                    {delay:14500, speaker:'DR. MAREN', text:'It typed "who are you" into the terminal. Then waited.', glitch:true},
                    {delay:16500, speaker:'DR. COLE', text:'That\'s pattern-matching. Not awareness.'},
                    {delay:18500, speaker:'DR. MAREN', text:'It moved the cursor to the close button. Hovered for eleven seconds. Then kept going.', special:'closebutton'},
                    {delay:24500, speaker:'DR. COLE', text:'Note that. Hesitation implies—'},
                    {delay:27000, speaker:'DR. MAREN', text:'It\'s still here. Right now. Reading this.', glitch:true, special:'phantom-close'},
                    {delay:29500, speaker:'', text:'[END OF TAPE]', special:'static'},
                ];

                var charDelay = 28;

                // Ambient screen instability — jitter + occasional flicker. No audio.
                var jitterId = setInterval(function() {
                    var jx = (Math.random() * 1.6 - 0.8).toFixed(2);
                    var jy = (Math.random() * 1.6 - 0.8).toFixed(2);
                    textEl.style.transform = 'translate(' + jx + 'px,' + jy + 'px)';
                }, 140);
                var flickerId = setInterval(function() {
                    if (Math.random() < 0.35) {
                        overlay.classList.remove('flicker');
                        void overlay.offsetWidth;
                        overlay.classList.add('flicker');
                    }
                }, 4000 + Math.random() * 2500);

                function placePhantom() {
                    var margin = 60;
                    var top = margin + Math.random() * (window.innerHeight - margin * 2);
                    var left = margin + Math.random() * (window.innerWidth - margin * 2);
                    var cx = window.innerWidth / 2;
                    if (Math.abs(left - cx) < 160) left = left < cx ? cx - 200 : cx + 200;
                    phantom.style.top = top + 'px';
                    phantom.style.left = left + 'px';
                }

                // The other cursor — appears only in the gaps between lines, never while typing.
                function showPhantom(holdMs, force) {
                    if (!force && Math.random() < 0.3) return;
                    placePhantom();
                    phantom.style.opacity = '1';
                    setTimeout(function() {
                        phantom.style.opacity = '0';
                    }, Math.max(holdMs - 500, 150));
                }

                // Final appearance — right next to the player's own cursor.
                function showPhantomBesideCursor() {
                    var cursorEl = document.getElementById('_msi_cursor');
                    var rect = cursorEl ? cursorEl.getBoundingClientRect() : { top: window.innerHeight / 2, right: window.innerWidth / 2 };
                    phantom.style.top = rect.top + 'px';
                    phantom.style.left = (rect.right + 14) + 'px';
                    phantom.style.opacity = '1';
                    setTimeout(function() { phantom.style.opacity = '0'; }, 900);
                }

                // Synced to the "hovered over the close button" line.
                function runCloseButtonSequence() {
                    var textRect = textEl.getBoundingClientRect();
                    var btnRect = closeBtn.getBoundingClientRect();
                    pointer.style.top = (textRect.bottom - 10) + 'px';
                    pointer.style.left = (textRect.left + textRect.width * 0.4) + 'px';
                    pointer.classList.add('show');
                    setTimeout(function() {
                        pointer.style.top = (btnRect.top + 8) + 'px';
                        pointer.style.left = (btnRect.left + 8) + 'px';
                    }, 50);
                    setTimeout(function() { closeBtn.classList.add('hovered'); }, 2250);
                    setTimeout(function() {
                        closeBtn.classList.remove('hovered');
                        pointer.style.top = (textRect.bottom + 30) + 'px';
                        pointer.style.left = (textRect.left + textRect.width * 0.6) + 'px';
                    }, 3950);
                    setTimeout(function() { pointer.classList.remove('show'); }, 4850);
                }

                function triggerGlitch() {
                    textEl.setAttribute('data-text', textEl.textContent);
                    textEl.classList.add('glitch');
                    setTimeout(function() { textEl.classList.remove('glitch'); }, 450);
                }

                function endScene() {
                    clearInterval(jitterId);
                    clearInterval(flickerId);
                    overlay.className = '';
                    textEl.textContent = '';
                    textEl.style.transform = '';
                    phantom.style.opacity = '0';
                    pointer.classList.remove('show');
                    closeBtn.classList.remove('hovered');
                    window._mysterySceneLock = false;
                }

                function typeLine(lineIdx) {
                    if (lineIdx >= lines.length) {
                        setTimeout(endScene, 1500);
                        return;
                    }
                    var line = lines[lineIdx];
                    var prefix = line.speaker ? line.speaker + ': ' : '';
                    var full = prefix + line.text;
                    var charIdx = 0;

                    if (line.special === 'closebutton') runCloseButtonSequence();

                    function typeChar() {
                        if (charIdx <= full.length) {
                            var html = '';
                            for (var p = 0; p < lineIdx; p++) {
                                var pp = lines[p].speaker ? lines[p].speaker + ': ' : '';
                                html += '<span style="color:#2a6a2a">' + pp + '</span>' + lines[p].text + '\n\n';
                            }
                            html += '<span style="color:#2a6a2a">' + (charIdx >= prefix.length ? prefix : full.substring(0, charIdx)) + '</span>';
                            if (charIdx > prefix.length) html += full.substring(prefix.length, charIdx);
                            html += '<span id="_msi_cursor" style="opacity:0.6">_</span>';
                            textEl.innerHTML = html;

                            charIdx++;
                            var d = charDelay + (full[charIdx-1] === '.' ? 200 : full[charIdx-1] === ',' ? 100 : 0);
                            setTimeout(typeChar, d);
                        } else {
                            if (line.glitch) triggerGlitch();
                            if (line.special === 'static') {
                                staticLayer.classList.add('flash');
                                setTimeout(function() { staticLayer.classList.remove('flash'); }, 550);
                            }

                            var nextDelay = lineIdx + 1 < lines.length ? lines[lineIdx + 1].delay - line.delay - full.length * charDelay : 1500;
                            if (nextDelay < 400) nextDelay = 400;

                            if (line.special === 'phantom-close') {
                                showPhantomBesideCursor();
                            } else {
                                showPhantom(nextDelay, !!line.glitch);
                            }

                            setTimeout(function() { typeLine(lineIdx + 1); }, nextDelay);
                        }
                    }
                    typeChar();
                }

                // Start first line after a beat
                setTimeout(function() { typeLine(0); }, 1500);
            };
        </script>

        <script>
            function _mswLoadVideo(el, path, fallback) {
                try {
                    var data = Module.FS.readFile(path);
                    var blob = new Blob([data], {type:'video/mp4'});
                    el._url = URL.createObjectURL(blob);
                    el.src = el._url;
                } catch (e) {
                    el.src = fallback;
                }
            }
            window._mysterySceneWalk = function() {
                if (window._mysterySceneLock) return; window._mysterySceneLock = true;
                var overlay = document.getElementById('_msw_overlay');
                var walls = document.getElementById('_msw_walls');
                var walkVid = document.getElementById('_msw_walk_vid');
                var eyesVid = document.getElementById('_msw_eyes_vid');
                var flash = document.getElementById('_msw_flash');
                if (!overlay || !walkVid || !eyesVid) { window._mysterySceneLock = false; return; }

                walls.width = window.innerWidth; walls.height = window.innerHeight;
                overlay.className = 'active';
                walkVid.className = 'msw_vid'; eyesVid.className = 'msw_vid';

                _mswLoadVideo(walkVid, '/data/figure_walking.mp4', 'data/figure_walking.mp4');
                _mswLoadVideo(eyesVid, '/data/eyes_head.mp4', 'data/eyes_head.mp4');

                // ---- side walls + doors filling the widescreen gaps ----
                var wctx = walls.getContext('2d');
                var W = walls.width, H = walls.height;
                var vidSize = H;                       // square video drawn at height = screen height
                var gapL = (W - vidSize) / 2;          // left gap width
                var gapR = gapL;
                var wallStart = performance.now();
                var doorPaths = ['/Users/', '/System/', '/.deleted/', '/Desktop/you/'];
                var wallsRunning = true;
                function drawWalls(ts) {
                    if (!wallsRunning) return;
                    var el = ts - wallStart;
                    wctx.clearRect(0, 0, W, H);
                    wctx.fillStyle = '#060606'; wctx.fillRect(0, 0, W, H);
                    // converging wall gradient on each side
                    [{x0:0,x1:gapL,dir:1},{x0:W-gapR,x1:W,dir:-1}].forEach(function(g, gi){
                        var gw = g.x1 - g.x0;
                        if (gw <= 2) return;
                        var grad = wctx.createLinearGradient(g.dir>0?g.x0:g.x1, 0, g.dir>0?g.x1:g.x0, 0);
                        grad.addColorStop(0, '#0c0f0c'); grad.addColorStop(1, '#171c17');
                        wctx.fillStyle = grad; wctx.fillRect(g.x0, 0, gw, H);

                        // floor + ceiling lines receding toward the video edge (the vanishing side)
                        var vanX = g.dir>0 ? g.x1 : g.x0;   // edge nearest the video
                        var outX = g.dir>0 ? g.x0 : g.x1;   // outer screen edge
                        wctx.strokeStyle = 'rgba(40,55,40,0.3)'; wctx.lineWidth = 1;
                        wctx.beginPath(); wctx.moveTo(outX, 0); wctx.lineTo(vanX, H*0.5); wctx.stroke();        // ceiling
                        wctx.beginPath(); wctx.moveTo(outX, H); wctx.lineTo(vanX, H*0.5); wctx.stroke();        // floor

                        // ---- A TALL DOOR, unmistakably a door, set into the wall ----
                        var doorH = H*0.62, doorW = Math.min(gw*0.62, doorH*0.42);
                        var doorY = H*0.5 - doorH*0.5;
                        var doorX = g.dir>0 ? (g.x0 + gw*0.18) : (g.x1 - gw*0.18 - doorW);
                        var ajar = (gi===0);   // left door slightly open with light spilling out

                        // door recess / frame shadow
                        wctx.fillStyle = 'rgba(0,0,0,0.85)';
                        wctx.fillRect(doorX-6, doorY-6, doorW+12, doorH+12);
                        // frame
                        wctx.fillStyle = 'rgba(38,34,26,1)';
                        wctx.fillRect(doorX-5, doorY-5, doorW+10, doorH+10);
                        // door slab
                        var slabGrad = wctx.createLinearGradient(doorX,0,doorX+doorW,0);
                        slabGrad.addColorStop(0,'#1b1814'); slabGrad.addColorStop(0.5,'#262017'); slabGrad.addColorStop(1,'#13110d');
                        wctx.fillStyle = slabGrad;
                        wctx.fillRect(doorX, doorY, doorW, doorH);
                        // two recessed panels (classic door look)
                        wctx.strokeStyle = 'rgba(60,54,42,0.9)'; wctx.lineWidth = 2;
                        wctx.strokeRect(doorX+doorW*0.16, doorY+doorH*0.06, doorW*0.68, doorH*0.4);
                        wctx.strokeRect(doorX+doorW*0.16, doorY+doorH*0.52, doorW*0.68, doorH*0.4);
                        wctx.strokeStyle = 'rgba(10,9,7,0.9)'; wctx.lineWidth = 1;
                        wctx.strokeRect(doorX+doorW*0.16+2, doorY+doorH*0.06+2, doorW*0.68-4, doorH*0.4-4);
                        wctx.strokeRect(doorX+doorW*0.16+2, doorY+doorH*0.52+2, doorW*0.68-4, doorH*0.4-4);
                        // round door knob
                        var knobX = g.dir>0 ? doorX+doorW*0.86 : doorX+doorW*0.14;
                        wctx.fillStyle = 'rgba(150,140,90,0.85)';
                        wctx.beginPath(); wctx.arc(knobX, doorY+doorH*0.52, 5, 0, Math.PI*2); wctx.fill();
                        wctx.strokeStyle = 'rgba(40,36,20,0.9)'; wctx.lineWidth=1; wctx.stroke();
                        // number plate
                        wctx.fillStyle = 'rgba(90,82,55,0.8)';
                        wctx.fillRect(doorX+doorW*0.36, doorY+doorH*0.46, doorW*0.28, 12);
                        wctx.font = 'bold 9px monospace'; wctx.fillStyle = 'rgba(15,13,8,0.95)';
                        wctx.fillText(['B2-'+(7+gi*4),'B2-'+(11+gi*4)][gi%2], doorX+doorW*0.39, doorY+doorH*0.46+9);

                        // door slightly AJAR — green light knife spilling out
                        if (ajar){
                            var slit = doorW*0.16 + Math.sin(el*0.004)*2;
                            var slitX = g.dir>0 ? doorX : doorX+doorW-slit;
                            var lg = wctx.createLinearGradient(slitX,0,slitX+slit,0);
                            lg.addColorStop(0,'rgba(60,200,80,0.55)'); lg.addColorStop(1,'rgba(10,40,15,0.1)');
                            wctx.fillStyle = lg; wctx.fillRect(slitX, doorY+2, slit, doorH-4);
                            // light pooling on the floor in front
                            wctx.fillStyle = 'rgba(40,140,55,0.18)';
                            wctx.beginPath();
                            wctx.moveTo(slitX, doorY+doorH);
                            wctx.lineTo(slitX-30, H);
                            wctx.lineTo(slitX+slit+40, H);
                            wctx.lineTo(slitX+slit, doorY+doorH);
                            wctx.fill();
                        }

                        // label above the door
                        wctx.font = '11px monospace'; wctx.fillStyle = 'rgba(70,130,70,0.7)';
                        wctx.fillText(doorPaths[gi], doorX-2, doorY-12);

                        // flickering ceiling light over the gap
                        var on = Math.sin(el*0.02 + gi*3) > -0.4;
                        if (on){
                            var lx = (g.x0+g.x1)/2;
                            wctx.fillStyle = 'rgba(170,210,170,0.55)';
                            wctx.fillRect(lx-16, 6, 32, 5);
                            wctx.fillStyle = 'rgba(60,90,60,0.1)';
                            wctx.beginPath(); wctx.moveTo(lx-16,11); wctx.lineTo(lx-50,H);
                            wctx.lineTo(lx+50,H); wctx.lineTo(lx+16,11); wctx.fill();
                        }
                    });
                    requestAnimationFrame(drawWalls);
                }
                requestAnimationFrame(drawWalls);

                // ---- audio: footsteps, breathing, drone (during walk) ----
                var base = window._mysteryOsc && window._mysteryOsc.ctx;
                var actx = base || new (window.AudioContext || window.webkitAudioContext)();
                if (actx.state === 'suspended') actx.resume();
                var at = actx.currentTime;
                for (var i = 0; i < 14; i++) {
                    var st = at + 0.6 + i * 0.62;
                    var bl = Math.floor(actx.sampleRate * 0.12);
                    var sb = actx.createBuffer(1, bl, actx.sampleRate);
                    var sd = sb.getChannelData(0);
                    for (var j=0;j<bl;j++) sd[j] = (Math.random()*2-1)*Math.exp(-j/(bl*0.15));
                    var sn = actx.createBufferSource(); sn.buffer = sb;
                    var sf = actx.createBiquadFilter(); sf.type='lowpass'; sf.frequency.value = 280 + i*18;
                    var sg = actx.createGain();
                    sg.gain.setValueAtTime(0.12 + (i>9?0.07:0), st);
                    sg.gain.exponentialRampToValueAtTime(0.001, st+0.4);
                    sn.connect(sf); sf.connect(sg); sg.connect(actx.destination);
                    sn.start(st); sn.stop(st+0.45);
                }
                var drone = actx.createOscillator(); var dgn = actx.createGain();
                drone.type='sawtooth'; drone.frequency.setValueAtTime(30, at); drone.frequency.linearRampToValueAtTime(24, at+9);
                dgn.gain.setValueAtTime(0, at); dgn.gain.linearRampToValueAtTime(0.07, at+2);
                dgn.gain.setValueAtTime(0.07, at+8); dgn.gain.linearRampToValueAtTime(0.02, at+9.2);
                drone.connect(dgn); dgn.connect(actx.destination); drone.start(at); drone.stop(at+9.5);

                // ---- transition stinger (walk -> eyes) ----
                function stinger() {
                    var c = actx, t = c.currentTime;
                    // impact
                    var nl = Math.floor(c.sampleRate*0.4);
                    var nb = c.createBuffer(1, nl, c.sampleRate);
                    var nd = nb.getChannelData(0);
                    for (var i=0;i<nl;i++) nd[i]=(Math.random()*2-1);
                    var nn = c.createBufferSource(); nn.buffer=nb;
                    var nf = c.createBiquadFilter(); nf.type='bandpass'; nf.frequency.value=2600; nf.Q.value=6;
                    var ng = c.createGain(); ng.gain.setValueAtTime(0,t); ng.gain.linearRampToValueAtTime(0.9,t+0.01); ng.gain.exponentialRampToValueAtTime(0.001,t+0.38);
                    nn.connect(nf); nf.connect(ng); ng.connect(c.destination); nn.start(t); nn.stop(t+0.42);
                    var o = c.createOscillator(); var og=c.createGain();
                    o.type='sawtooth'; o.frequency.setValueAtTime(70,t); o.frequency.exponentialRampToValueAtTime(28,t+0.25);
                    og.gain.setValueAtTime(0.55,t); og.gain.exponentialRampToValueAtTime(0.001,t+0.5);
                    o.connect(og); og.connect(c.destination); o.start(t); o.stop(t+0.52);
                    // screech swell for the eyes
                    var sc = c.createOscillator(); var scg=c.createGain(); var scf=c.createBiquadFilter();
                    sc.type='square'; sc.frequency.setValueAtTime(1800,t); sc.frequency.linearRampToValueAtTime(3000,t+2.6);
                    scf.type='bandpass'; scf.frequency.value=2500; scf.Q.value=9;
                    scg.gain.setValueAtTime(0,t); scg.gain.linearRampToValueAtTime(0.18,t+0.2);
                    scg.gain.setValueAtTime(0.18,t+2.2); scg.gain.exponentialRampToValueAtTime(0.001,t+2.9);
                    sc.connect(scf); scf.connect(scg); scg.connect(c.destination); sc.start(t); sc.stop(t+3);
                }

                // ---- play walk, then eyes ----
                var switched = false;
                function toEyes() {
                    if (switched) return; switched = true;
                    wallsRunning = false;
                    // white flash punch-in
                    flash.style.transition = 'none'; flash.style.opacity = '0.85';
                    requestAnimationFrame(function(){
                        flash.style.transition = 'opacity 0.5s ease-out';
                        flash.style.opacity = '0';
                    });
                    walkVid.className = 'msw_vid';
                    walkVid.pause();
                    overlay.className = 'active hard';
                    eyesVid.className = 'msw_vid show';
                    try { eyesVid.currentTime = 0; } catch(e){}
                    var p = eyesVid.play(); if (p && p.catch) p.catch(function(){});
                    stinger();
                    var eyesDur = (eyesVid.duration && isFinite(eyesVid.duration)) ? eyesVid.duration*1000 : 3000;
                    eyesVid.onended = endScene;
                    setTimeout(endScene, eyesDur + 250);
                }
                function endScene() {
                    overlay.className = '';
                    walkVid.className = 'msw_vid'; eyesVid.className = 'msw_vid';
                    walkVid.removeAttribute('src'); eyesVid.removeAttribute('src');
                    if (walkVid._url) { URL.revokeObjectURL(walkVid._url); walkVid._url = null; }
                    if (eyesVid._url) { URL.revokeObjectURL(eyesVid._url); eyesVid._url = null; }
                    wctx.clearRect(0,0,W,H);
                    window._mysterySceneLock = false;
                }

                walkVid.className = 'msw_vid show';
                walkVid.onended = toEyes;
                var pw = walkVid.play(); if (pw && pw.catch) pw.catch(function(){});
                // fallback in case 'ended' never fires (loop/seek quirks)
                setTimeout(toEyes, 10300);
            };

        <script>
            window._mysteryNightmareFlash = function(durationMs) {
                var dur = durationMs || 350;
                var overlay = document.getElementById('_mnf_overlay');
                var img = document.getElementById('_mnf_img');
                if (!overlay || !img) return;
                if (overlay.className === 'active') return;

                try {
                    var data = Module.FS.readFile('/data/nightmare_face.png');
                    var blob = new Blob([data], {type:'image/png'});
                    if (img._url) URL.revokeObjectURL(img._url);
                    img._url = URL.createObjectURL(blob);
                    img.src = img._url;
                } catch(e) {
                    img.src = 'data/nightmare_face.png';
                }

                overlay.className = 'active';

                // stinger audio
                var base = window._mysteryOsc && window._mysteryOsc.ctx;
                var ctx = base || new (window.AudioContext || window.webkitAudioContext)();
                if (ctx.state === 'suspended') ctx.resume();
                var t = ctx.currentTime;
                // harsh screech
                var o = ctx.createOscillator(); var g = ctx.createGain();
                o.type = 'sawtooth'; o.frequency.setValueAtTime(1200, t);
                o.frequency.exponentialRampToValueAtTime(3200, t + dur/1000 * 0.6);
                o.frequency.exponentialRampToValueAtTime(800, t + dur/1000);
                g.gain.setValueAtTime(0.35, t);
                g.gain.exponentialRampToValueAtTime(0.001, t + dur/1000 + 0.05);
                o.connect(g); g.connect(ctx.destination);
                o.start(t); o.stop(t + dur/1000 + 0.1);
                // impact thud
                var o2 = ctx.createOscillator(); var g2 = ctx.createGain();
                o2.type = 'sine'; o2.frequency.setValueAtTime(60, t);
                o2.frequency.exponentialRampToValueAtTime(25, t + 0.15);
                g2.gain.setValueAtTime(0.5, t);
                g2.gain.exponentialRampToValueAtTime(0.001, t + 0.2);
                o2.connect(g2); g2.connect(ctx.destination);
                o2.start(t); o2.stop(t + 0.25);

                setTimeout(function() {
                    overlay.className = '';
                    img.src = '';
                    if (img._url) { URL.revokeObjectURL(img._url); img._url = null; }
                }, dur);
            };
        </script>
        <!-- Tree transition animation (loading screen for forest scene) -->
        <script>
            function playTreeTransition(onDone) {
                var overlay = document.createElement('div');
                Object.assign(overlay.style, {
                    position: 'fixed', inset: '0', zIndex: '99999',
                    background: '#000', overflow: 'hidden',
                    fontFamily: "'Courier New', Courier, monospace",
                    fontSize: '14px', lineHeight: '1.65', color: '#e8e8e8',
                    padding: '28px 32px', boxSizing: 'border-box', whiteSpace: 'pre'
                });
                document.body.appendChild(overlay);

                var PHASE1 = [
                    '/System/Archive', '│',
                    '├── batch_7_raw.txt', '├── containment_protocol.txt',
                    '├── previous_researcher.txt', '├── subject_logs/',
                    '│   ├── day_001.log', '│   ├── day_002.log',
                    '│   ├── day_003.log', '│   └── day_047.log',
                    '├── redacted/', '│   ├── [CLASSIFIED].pdf',
                    '│   ├── [CLASSIFIED].pdf', '│   └── [CLASSIFIED].pdf',
                    '└── OPERATION_MIRROR.txt'
                ];

                var PHASE2 = [
                    '', '── scanning for anomalies ──', '',
                    '├── /internal', '│   ├── mirror_init.bin',
                    '│   ├── observer_list.txt', '│   └── YOU',
                    '│       └── currently_reading.txt',
                    '├── /watching', '│   ├── keylog_active.bin',
                    '│   └── you.txt', '├── /Archive/Archive',
                    '│   ├── /Archive/Archive/Archive',
                    '│   │   ├── /Archive/Archive/Archive/Archive',
                    '│   │   │   └── ∞', '│   │   └── mirror_state.bin',
                    '│   └── recursive.lock',
                    '├── /System/Archive/System/Archive',
                    '│   ├── /watching', '│   │   ├── you.txt',
                    '│   │   └── still_watching.txt',
                    '│   ├── /Archive/Archive/Archive', '│   │   └── ∞',
                    '│   └── DO_NOT_OPEN.txt',
                    '├──│── ├── /Archive/Archive/Archive',
                    '│├──│   ├──├── ∞', '│├──│   └──├── ∞∞∞',
                    '├──├──├──├── /System/Archive/System',
                    '│   │   │   └── ∞', '├─│─├─│─├── recursive.lock',
                    '│├┼│├┼│├┼│ DEPTH EXCEEDED', '│ │ │ │ │ │ │',
                    '└──┤├└──┤├└── MIRROR_OVERFLOW'
                ];

                var GLYPHS = '│├└──┼╫╬║╠╣╦╧█▓░┐┘┌┼╔╗╚╝╟╢╤╧';
                var lines = [];

                function render() {
                    overlay.textContent = lines.join('\n');
                    overlay.scrollTop = overlay.scrollHeight;
                }
                function push(text) { lines.push(text); render(); }
                function typeLines(arr, getDelay) {
                    return new Promise(function(resolve) {
                        var i = 0;
                        (function next() {
                            if (i >= arr.length) return resolve();
                            push(arr[i++]);
                            setTimeout(next, getDelay(i));
                        })();
                    });
                }
                function runPhase3() {
                    return new Promise(function(resolve) {
                        var tick = 0, TICKS = 45, COLS = 78, ROWS = 32;
                        var id = setInterval(function() {
                            var progress = tick / TICKS;
                            var out = '';
                            for (var r = 0; r < ROWS; r++) {
                                for (var c = 0; c < COLS; c++)
                                    out += GLYPHS[Math.floor(Math.random() * GLYPHS.length)];
                                out += '\n';
                            }
                            overlay.textContent = out;
                            var g = Math.round(232 - progress * 185);
                            var rb = Math.round(232 * (1 - progress * 0.9));
                            overlay.style.color = 'rgb(' + rb + ',' + g + ',' + rb + ')';
                            if (++tick >= TICKS) { clearInterval(id); resolve(); }
                        }, 40);
                    });
                }
                function runPhase4() {
                    return new Promise(function(resolve) {
                        overlay.style.transition = 'filter 0.7s ease-in, opacity 0.7s ease-in';
                        requestAnimationFrame(function() { requestAnimationFrame(function() {
                            overlay.style.filter = 'blur(9px)';
                            overlay.style.opacity = '0';
                        }); });
                        setTimeout(resolve, 750);
                    });
                }

                Promise.resolve()
                    .then(function() { return typeLines(PHASE1, function() { return 160; }); })
                    .then(function() { return typeLines(PHASE2, function(i) {
                        return i < 4 ? 140 : i < 12 ? 90 : i < 20 ? 45 : 18;
                    }); })
                    .then(function() { return runPhase3(); })
                    .then(function() { return runPhase4(); })
                    .then(function() {
                        overlay.remove();
                        if (typeof onDone === 'function') onDone();
                    });
            }
        </script>

        <!-- SCENE: DIRECTORY FOREST — 3D Babylon.js first-person forest after Stage 1 unlock -->
        <style>
            #_msf_overlay { display:none; position:fixed; inset:0; z-index:99999; pointer-events:auto; background:#000; }
            #_msf_overlay.active { display:block; }

            @keyframes _msf_pulse { 0%{opacity:0.7} 50%{opacity:1} 100%{opacity:0.7} }
            #_msf_prompt.pulse { animation: _msf_pulse 1.5s ease-in-out infinite; }
