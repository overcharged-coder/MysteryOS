        </style>
        <div id="_msf_overlay">
            <canvas id="_msf_canvas" tabindex="0"></canvas>
            <div id="_msf_fade"></div>
            <div id="_msf_hud">
                <div id="_msf_path"></div>
                <div id="_msf_prompt"></div>
            </div>
            <div id="_msf_loading">building tree...</div>
        </div>
        <script>
            window._mysterySceneForest = function() {
                if (window._mysterySceneLock) return;
                var overlay = document.getElementById('_msf_overlay');
                var cvs = document.getElementById('_msf_canvas');
                var fade = document.getElementById('_msf_fade');
                var promptEl = document.getElementById('_msf_prompt');
                var pathEl = document.getElementById('_msf_path');
                var loadingEl = document.getElementById('_msf_loading');
                if (!overlay || !cvs) return;

                function boot() {
                    window._mysterySceneLock = true;
                    cvs.width = window.innerWidth; cvs.height = window.innerHeight;
                    overlay.className = 'active';
                    loadingEl.style.display = 'none';
                    pathEl.textContent = '/';
                    promptEl.textContent = '';
                    promptEl.style.opacity = '0';

                    var engine = new BABYLON.Engine(cvs, true);
                    var scene = new BABYLON.Scene(engine);
                    scene.clearColor = new BABYLON.Color3(0.005, 0.005, 0.005);
                    scene.ambientColor = new BABYLON.Color3(0.01, 0.01, 0.01);
                    scene.fogMode = BABYLON.Scene.FOGMODE_EXP2;
                    scene.fogDensity = 0.045;
                    scene.fogColor = new BABYLON.Color3(0.005, 0.008, 0.005);
                    scene.collisionsEnabled = true;
                    scene.gravity = new BABYLON.Vector3(0, -0.15, 0);

                    var camera = new BABYLON.UniversalCamera('cam', new BABYLON.Vector3(0, 1.7, -3), scene);
                    camera.setTarget(new BABYLON.Vector3(0, 1.7, 5));
                    camera.speed = 0.25;
                    camera.angularSensibility = 4000;
                    camera.inertia = 0.82;
                    camera.minZ = 0.05;
                    camera.keysUp = [87]; camera.keysDown = [83];
                    camera.keysLeft = [65]; camera.keysRight = [68];
                    camera.checkCollisions = true;
                    camera.ellipsoid = new BABYLON.Vector3(0.5, 0.85, 0.5);
                    camera.applyGravity = true;
                    camera.attachControl(cvs, true);

                    cvs.addEventListener('click', function() { cvs.requestPointerLock(); });

                    var light = new BABYLON.HemisphericLight('hl', new BABYLON.Vector3(0.1, 1, 0.1), scene);
                    light.intensity = 0.015;
                    light.diffuse = new BABYLON.Color3(0.1, 0.15, 0.1);
                    light.groundColor = new BABYLON.Color3(0.01, 0.02, 0.01);

                    // --- Flashlight (SpotLight) ---
                    var flashSpot = new BABYLON.SpotLight('flash',
                        camera.position.clone(),
                        new BABYLON.Vector3(0, 0, 1),
                        Math.PI / 4.5, 8, scene);
                    flashSpot.intensity = 3.5;
                    flashSpot.diffuse = new BABYLON.Color3(0.95, 0.9, 0.75);
                    flashSpot.range = 35;

                    // Flashlight 3D model in player's hand (updated each frame, not parented to camera)
                    var flRoot = new BABYLON.TransformNode('flRoot', scene);
                    flRoot.scaling.setAll(0.045);
                    BABYLON.SceneLoader.ImportMesh('', 'data/', 'Flashlight.obj', scene, function(meshes) {
                        meshes.forEach(function(m) {
                            m.parent = flRoot;
                            if (m.material) {
                                m.material.disableLighting = true;
                                m.material.emissiveColor = new BABYLON.Color3(0.35, 0.33, 0.3);
                            }
                        });
                    });

                    // --- Materials ---
                    var groundMat = new BABYLON.StandardMaterial('groundMat', scene);
                    groundMat.diffuseColor = new BABYLON.Color3(0.12, 0.15, 0.06);
                    groundMat.specularColor = BABYLON.Color3.Black();
                    groundMat.emissiveColor = BABYLON.Color3.Black();

                    var ground = BABYLON.MeshBuilder.CreateGround('ground', {width: 500, height: 500}, scene);
                    ground.material = groundMat;
                    ground.checkCollisions = true;
                    ground.freezeWorldMatrix();
                    groundMat.freeze();

                    // Invisible boundary walls
                    for (var wi = 0; wi < 4; wi++) {
                        var wall = BABYLON.MeshBuilder.CreateBox('wall' + wi, {
                            width: wi < 2 ? 120 : 1, height: 8, depth: wi < 2 ? 1 : 120
                        }, scene);
                        wall.position.y = 4;
                        if (wi === 0) wall.position.z = 60;
                        if (wi === 1) wall.position.z = -10;
                        if (wi === 2) wall.position.x = 55;
                        if (wi === 3) wall.position.x = -55;
                        wall.isVisible = false;
                        wall.checkCollisions = true;
                        wall.freezeWorldMatrix();
                    }

                    // Sky rectangle (window frame above canopy)
                    var skyRect = BABYLON.MeshBuilder.CreatePlane('skyRect', {width: 36, height: 22}, scene);
                    skyRect.position.set(5, 42, 30);
                    skyRect.rotation.x = Math.PI / 2;
                    var skyMat = new BABYLON.StandardMaterial('skyMat', scene);
                    skyMat.emissiveColor = new BABYLON.Color3(0.2, 0.2, 0.25);
                    skyMat.alpha = 0.35;
                    skyMat.backFaceCulling = false;
                    skyRect.material = skyMat;
                    skyRect.freezeWorldMatrix();
                    skyMat.freeze();

                    // --- Helpers ---
                    var signId = 0;
                    var allSigns = [];

                    // Tree positions queued for when model loads
                    var treePositions = [];
                    function queueTree(x, z, scale) {
                        var s = scale || (0.15 + Math.random() * 0.1);
                        treePositions.push({x: x, z: z, s: s, ry: Math.random() * Math.PI * 2});
                    }

                    // Load MapleTree.obj and instance at all queued positions
                    function spawnTrees() {
                        BABYLON.SceneLoader.ImportMesh('', 'data/', 'MapleTree.obj', scene, function(meshes) {
                            if (!meshes.length) return;
                            // Parent all sub-meshes under a root
                            var root = new BABYLON.TransformNode('treeRoot', scene);

                            // The maple model splits foliage across two meshes ("leaves" +
                            // "leaves.001"), but the exporter assigned one of them the bark
                            // material -> those render as opaque gray cards. Find the real leaf
                            // texture and apply it (with alpha) to every foliage mesh by name.
                            var leafTex = null;
                            meshes.forEach(function(m) {
                                if (m.material && m.material.diffuseTexture &&
                                    /maple_leaf/i.test(m.material.diffuseTexture.name || '')) {
                                    leafTex = m.material.diffuseTexture;
                                }
                            });
                            if (leafTex) leafTex.hasAlpha = true;

                            meshes.forEach(function(m) {
                                m.parent = root; m.isVisible = false;
                                if (!m.material) return;
                                m.material.emissiveColor = BABYLON.Color3.Black();
                                m.material.specularColor = BABYLON.Color3.Black();
                                var isLeaf = (m.name || '').toLowerCase().indexOf('leav') >= 0;
                                if (isLeaf) {
                                    if (leafTex) m.material.diffuseTexture = leafTex;
                                    m.material.opacityTexture = null;
                                    if (m.material.diffuseTexture) m.material.diffuseTexture.hasAlpha = true;
                                    m.material.useAlphaFromDiffuseTexture = true;
                                    m.material.transparencyMode = BABYLON.Material.MATERIAL_ALPHATEST;
                                    m.material.alphaCutOff = 0.4;
                                    m.material.backFaceCulling = false;
                                }
                            });
                            root.isVisible = false;
                            treePositions.forEach(function(tp, i) {
                                meshes.forEach(function(m) {
                                    var inst = m.createInstance('tree_' + i + '_' + m.name);
                                    inst.position.set(tp.x, 0, tp.z);
                                    inst.scaling.setAll(tp.s);
                                    inst.rotation.y = tp.ry;
                                    inst.freezeWorldMatrix();
                                });
                                // cheap collision: one invisible cylinder per trunk
                                var trunkR = 0.88 * tp.s;
                                var trunkH = 10 * tp.s;
                                var col = BABYLON.MeshBuilder.CreateCylinder('tCol' + i,
                                    {height: trunkH, diameter: trunkR * 2, tessellation: 6}, scene);
                                col.position.set(tp.x, trunkH * 0.5, tp.z);
                                col.isVisible = false;
                                col.checkCollisions = true;
                                col.freezeWorldMatrix();
                            });
                            meshes.forEach(function(m) { if (m.material) m.material.freeze(); });
                        });
                    }

                    // Sign model "sign.obj" has two parts:
                    //   Plane_Plane.001 (Material.002) -> the flat board (model X:2.0, Z:2.974, thin Y)
                    //   Cube_Cube.001   (Material.003) -> a 3.5-long mounting arm we DON'T want
                    // After rotation.x = -PI/2: model X -> world width, model Z -> world height.
                    var SIGN_MODEL_W = 2.0;      // board width  (model X)
                    var SIGN_MODEL_H = 2.974;    // board height (model Z span)
                    var SIGN_MODEL_ZC = -0.5245; // board center along model Z (-> world Y once stood up)

                    var signQueue = [];
                    var signModelLoaded = false;
                    var signBoardMeshes = [];    // board only; arm excluded

                    // shared dim-wood material for sign posts
                    var postMat = new BABYLON.StandardMaterial('postMat', scene);
                    postMat.diffuseColor = new BABYLON.Color3(0.18, 0.12, 0.07);
                    postMat.specularColor = BABYLON.Color3.Black();
                    postMat.emissiveColor = new BABYLON.Color3(0.02, 0.015, 0.01);

                    BABYLON.SceneLoader.ImportMesh('', 'data/', 'sign.obj', scene, function(meshes) {
                        var signRoot = new BABYLON.TransformNode('signRoot', scene);
                        meshes.forEach(function(m) {
                            m.parent = signRoot; m.isVisible = false;
                            if (m.material) {
                                m.material.specularColor = BABYLON.Color3.Black();
                                m.material.emissiveColor = new BABYLON.Color3(0.06, 0.04, 0.02);
                            }
                            // keep only the flat board; drop the long mounting arm
                            if ((m.name || '').toLowerCase().indexOf('plane') >= 0) {
                                signBoardMeshes.push(m);
                            }
                        });
                        signModelLoaded = true;
                        signQueue.forEach(function(q) { placeSign(q); });
                    });

                    function placeSign(q) {
                        var sx = q.w / SIGN_MODEL_W;   // model X -> world width
                        var sz = q.h / SIGN_MODEL_H;   // model Z -> world height
                        var sy = Math.min(sx, sz);     // thickness, keep proportional-ish
                        // lift so the board's center sits at q.cy
                        var yOffset = q.cy - SIGN_MODEL_ZC * sz;
                        signBoardMeshes.forEach(function(m) {
                            var inst = m.createInstance('sgn_' + q.id + '_' + m.name);
                            inst.rotation.x = -Math.PI / 2;
                            inst.rotation.y = (q.rotY || 0) + Math.PI;
                            inst.scaling.set(sx, sy, sz);
                            inst.position.set(q.x, yOffset, q.z);
                            inst.freezeWorldMatrix();
                        });
                    }

                    function createSign(text, x, y, z, rotY, w, h) {
                        var id = 'sgn' + (signId++);
                        var boardW = w || 2.4;
                        var boardH = boardW * 0.58;    // landscape board so paths fit
                        var cy = y || 1.3;             // board center / text height

                        var q = {id: id, x: x, z: z, rotY: rotY || 0, w: boardW, h: boardH, cy: cy};
                        if (signModelLoaded) placeSign(q);
                        else signQueue.push(q);

                        // invisible collision box for the whole sign
                        var colBox = BABYLON.MeshBuilder.CreateBox(id + 'col',
                            {width: boardW, height: cy + boardH * 0.5, depth: 0.3}, scene);
                        colBox.position.set(x, (cy + boardH * 0.5) / 2, z);
                        colBox.isVisible = false;
                        colBox.checkCollisions = true;
                        colBox.freezeWorldMatrix();

                        // wooden post from the ground up to the board's bottom edge
                        var postTop = cy - boardH * 0.5;
                        if (postTop > 0.25) {
                            var post = BABYLON.MeshBuilder.CreateCylinder(id + 'p',
                                {height: postTop, diameter: 0.13}, scene);
                            post.position.set(x, postTop * 0.5, z);
                            post.material = postMat;
                            post.freezeWorldMatrix();
                        }

                        // Red text drawn on a transparent plane sitting on the board face
                        var tw = 512, th = 256;
                        var dt = new BABYLON.DynamicTexture(id + 'dt', {width: tw, height: th}, scene, false);
                        dt.hasAlpha = true;
                        var mat = new BABYLON.StandardMaterial(id + 'mat', scene);
                        mat.diffuseTexture = dt;
                        mat.useAlphaFromDiffuseTexture = true;
                        mat.transparencyMode = BABYLON.Material.MATERIAL_ALPHABLEND;
                        mat.backFaceCulling = false;

                        var fw = boardW * 0.86;
                        var fh = fw * (th / tw);
                        var face = BABYLON.MeshBuilder.CreatePlane(id + 'f',
                            {width: fw, height: fh, sideOrientation: BABYLON.Mesh.DOUBLESIDE}, scene);
                        var rr = (rotY || 0) + Math.PI;
                        face.position.set(x + Math.sin(rr) * 0.09, cy, z + Math.cos(rr) * 0.09);
                        face.rotation.y = rr;
                        face.material = mat;
                        // plane is flipped by PI to face the player -> mirror UVs so text reads left-to-right
                        var uvs = face.getVerticesData(BABYLON.VertexBuffer.UVKind);
                        for (var ui = 0; ui < uvs.length; ui += 2) uvs[ui] = 1.0 - uvs[ui];
                        face.setVerticesData(BABYLON.VertexBuffer.UVKind, uvs);
                        face.freezeWorldMatrix();

                        function draw(txt, color) {
                            var c = dt.getContext();
                            c.clearRect(0, 0, tw, th);
                            if (txt) {
                                var fs = 48;
                                c.font = 'bold ' + fs + 'px monospace';
                                var maxW = tw - 36;
                                while (c.measureText(txt).width > maxW && fs > 14) {
                                    fs -= 2;
                                    c.font = 'bold ' + fs + 'px monospace';
                                }
                                c.textBaseline = 'middle';
                                c.shadowColor = '#000';
                                c.shadowBlur = 10;
                                c.fillStyle = color || '#e23b2e';
                                var txtW = c.measureText(txt).width;
                                c.fillText(txt, (tw - txtW) * 0.5, th * 0.5);
                                c.shadowBlur = 0;
                            }
                            dt.update();
                        }
                        draw(text);

                        var s = {mesh: face, setText: function(t, c) { draw(t, c); }};
                        allSigns.push(s);
                        return s;
                    }

                    // --- Forest generation ---
                    function isOnPath(x, z) {
                        if (x * x + z * z < 70) return true;
                        if (Math.abs(x) < 3.5 && z > 6 && z < 38) return true;
                        if (z > 36 && z < 72 && x > -5 && x < 20) return true;
                        if (z > 36 && z < 56 && x < 0 && x > -14) return true;
                        var dz = 5 + Math.abs(x + 5) * 0.3;
                        if (x < -4 && x > -34 && Math.abs(z - dz) < 4) return true;
                        dz = 5 + Math.abs(x - 5) * 0.3;
                        if (x > 4 && x < 34 && Math.abs(z - dz) < 4) return true;
                        return false;
                    }

                    var treeCount = 0;
                    for (var ti = 0; ti < 200 && treeCount < 60; ti++) {
                        var tx = (Math.random() - 0.5) * 100;
                        var tz = Math.random() * 75 - 8;
                        if (!isOnPath(tx, tz)) { queueTree(tx, tz); treeCount++; }
                    }

                    // Labeled trees along paths — sign placed beside tree, facing away from trunk
                    [   {x:-4, z:13, t:'/System',          side: 1},
                        {x:4,  z:22, t:'/System/Archive',  side:-1},
                        {x:-7, z:5,  t:'/Documents',       side:-1},
                        {x:7,  z:4,  t:'/Desktop',         side: 1},
                        {x:-3, z:32, t:'/System/logs',      side: 1},
                        {x:13, z:46, t:'/System/Archive/...', side:-1},
                        {x:-13,z:9,  t:'/Pictures',        side:-1},
                        {x:16, z:10, t:'/Users',           side: 1}
                    ].forEach(function(lt) {
                        queueTree(lt.x, lt.z);
                        var offX = lt.side * 2.2;
                        var rotY = Math.atan2(-offX, 0);
                        createSign(lt.t, lt.x + offX, 1.3, lt.z, rotY, 2.2, 0.4);
                    });

                    // Clearing directional signs — each faces outward from the clearing center
                    var signSystem = createSign('/System  >', 0, 1.4, 5.5, 0);
                    var signDocs = createSign('/Documents/Personal  >', -4.5, 1.4, 3.5, Math.PI * 0.25);
                    var signDesktop = createSign('/Desktop/message.txt  >', 4.5, 1.4, 3.5, -Math.PI * 0.25);

                    // Dead-end signs (initially blank)
                    var deadDocSign = createSign('', -28, 1.3, 12, Math.PI * 0.5);
                    queueTree(28, 12, 0.35);
                    var monitorSign = createSign('', 22, 1.5, 12.3, -Math.PI * 0.5, 2, 0.8);
                    var deadLogsSign = createSign('', -9, 1.3, 53, Math.PI * 0.3);

                    // Archive path deeper signs — varied angles
                    createSign('OPERATION_MIRROR.txt  >', 8, 1.4, 43, -0.4);
                    createSign('batch_7_raw.txt', 14, 1.3, 48, 0.5);
                    createSign('containment_protocol.txt', 7, 1.3, 53, -0.3);
                    createSign('previous_researcher.txt', 14, 1.3, 58, 0.6);

                    // MIRROR tree (massive version)
                    queueTree(12, 66, 0.45);
                    var mirrorLabel = createSign('OPERATION_MIRROR.txt', 8, 1.8, 45, 0.3, 3.2, 0.7);

                    // Glow sphere around the mirror tree
                    var mirrorGlow = BABYLON.MeshBuilder.CreateSphere('mirrorGlow', {diameter: 10, segments: 12}, scene);
                    mirrorGlow.position.set(12, 5, 66);
                    var glowMat = new BABYLON.StandardMaterial('glowMat', scene);
                    glowMat.emissiveColor = new BABYLON.Color3(0.06, 0.12, 0.06);
                    glowMat.alpha = 0.08;
                    glowMat.backFaceCulling = false;
                    mirrorGlow.material = glowMat;

                    // Floating "E" prompt near the MIRROR tree — only visible during phase 4
                    var eDt = new BABYLON.DynamicTexture('eDt', {width: 256, height: 256}, scene, false);
                    eDt.hasAlpha = true;
                    var eCtx = eDt.getContext();
                    eCtx.clearRect(0, 0, 256, 256);
                    eCtx.font = 'bold 180px monospace';
                    eCtx.textAlign = 'center';
                    eCtx.textBaseline = 'middle';
                    eCtx.shadowColor = '#ff0000';
                    eCtx.shadowBlur = 40;
                    eCtx.fillStyle = '#ff3333';
                    eCtx.fillText('E', 128, 128);
                    eCtx.shadowBlur = 0;
                    eDt.update();
                    var eMat = new BABYLON.StandardMaterial('eMat', scene);
                    eMat.diffuseTexture = eDt;
                    eMat.emissiveTexture = eDt;
                    eMat.emissiveColor = new BABYLON.Color3(1, 0.3, 0.3);
                    eMat.useAlphaFromDiffuseTexture = true;
                    eMat.transparencyMode = BABYLON.Material.MATERIAL_ALPHABLEND;
                    eMat.disableLighting = true;
                    eMat.backFaceCulling = false;
                    eMat.fogEnabled = false;
                    var ePlane = BABYLON.MeshBuilder.CreatePlane('ePlane',
                        {width: 2.5, height: 2.5, sideOrientation: BABYLON.Mesh.DOUBLESIDE}, scene);
                    ePlane.material = eMat;
                    ePlane.position.set(12, 4, 62);
                    ePlane.billboardMode = BABYLON.Mesh.BILLBOARDMODE_ALL;
                    ePlane.isVisible = false;

                    // Spawn all queued trees from OBJ
                    spawnTrees();

                    // (ground paper removed — looked wrong without a paper texture)

                    // --- State ---
                    var phase = 0, wrongCount = 0, interactable = false;
                    var cursorAppearances = 0, cursorVisible = false, cursorTimer = 0;

                    // --- Audio ---
                    var actx = new (window.AudioContext || window.webkitAudioContext)();
                    if (actx.state === 'suspended') actx.resume();

                    var windBuf = actx.createBuffer(1, actx.sampleRate * 4, actx.sampleRate);
                    var wd = windBuf.getChannelData(0);
                    for (var j = 0; j < wd.length; j++) wd[j] = Math.random() * 2 - 1;
                    var windSrc = actx.createBufferSource(); windSrc.buffer = windBuf; windSrc.loop = true;
                    var windFilt = actx.createBiquadFilter(); windFilt.type = 'bandpass'; windFilt.frequency.value = 400; windFilt.Q.value = 0.8;
                    var windGain = actx.createGain(); windGain.gain.value = 0.06;
                    windSrc.connect(windFilt); windFilt.connect(windGain); windGain.connect(actx.destination); windSrc.start();

                    var drone = actx.createOscillator(); drone.type = 'sine'; drone.frequency.value = 42;
                    var droneGain = actx.createGain(); droneGain.gain.value = 0.025;
                    drone.connect(droneGain); droneGain.connect(actx.destination); drone.start();

                    var lastStepTime = 0;
                    function playStep() {
                        var t = actx.currentTime;
                        if (t - lastStepTime < 0.42) return;
                        lastStepTime = t;
                        var bl = Math.floor(actx.sampleRate * 0.07);
                        var sb = actx.createBuffer(1, bl, actx.sampleRate);
                        var sd = sb.getChannelData(0);
                        for (var k = 0; k < bl; k++) sd[k] = (Math.random() * 2 - 1) * Math.exp(-k / (bl * 0.18));
                        var sn = actx.createBufferSource(); sn.buffer = sb;
                        var sf = actx.createBiquadFilter(); sf.type = 'lowpass'; sf.frequency.value = 320;
                        var sg = actx.createGain(); sg.gain.value = 0.1;
                        sn.connect(sf); sf.connect(sg); sg.connect(actx.destination);
                        sn.start(); sn.stop(t + 0.12);
                    }

                    // Distant typing clicks
                    var typingInt = setInterval(function() {
                        if (phase >= 5) return;
                        if (Math.random() > 0.25) return;
                        var bl = Math.floor(actx.sampleRate * 0.015);
                        var tb = actx.createBuffer(1, bl, actx.sampleRate);
                        var td = tb.getChannelData(0);
                        for (var k = 0; k < bl; k++) td[k] = (Math.random() * 2 - 1) * Math.exp(-k / (bl * 0.08));
                        var tn = actx.createBufferSource(); tn.buffer = tb;
                        var tf = actx.createBiquadFilter(); tf.type = 'highpass'; tf.frequency.value = 3200;
                        var tg = actx.createGain(); tg.gain.value = 0.035;
                        tn.connect(tf); tf.connect(tg); tg.connect(actx.destination);
                        tn.start(); tn.stop(actx.currentTime + 0.025);
                    }, 180);

                    // --- Cursor figure ---
                    var cursorFigure = BABYLON.MeshBuilder.CreatePlane('cursorFig', {width: 1.8, height: 1.4, sideOrientation: BABYLON.Mesh.DOUBLESIDE}, scene);
                    var cfMat = new BABYLON.StandardMaterial('cfMat', scene);
                    var eyeTex = new BABYLON.Texture('data/eyefull.png', scene);
                    eyeTex.hasAlpha = true;
                    cfMat.diffuseTexture = eyeTex;
                    cfMat.emissiveTexture = eyeTex;
                    cfMat.emissiveColor = new BABYLON.Color3(0.15, 0.1, 0.1);
                    cfMat.useAlphaFromDiffuseTexture = true;
                    cfMat.transparencyMode = BABYLON.Material.MATERIAL_ALPHABLEND;
                    cfMat.disableLighting = true;
                    cfMat.backFaceCulling = false;
                    cursorFigure.material = cfMat;
                    cursorFigure.billboardMode = BABYLON.Mesh.BILLBOARDMODE_Y;
                    cursorFigure.isVisible = false;

                    // --- Sky eyes — dozens of small eyes fill the sky, all tilted randomly ---
                    var skyEyeMat = new BABYLON.StandardMaterial('skyEyeMat', scene);
                    skyEyeMat.diffuseTexture = eyeTex;
                    skyEyeMat.emissiveTexture = eyeTex;
                    skyEyeMat.emissiveColor = new BABYLON.Color3(0.7, 0.5, 0.5);
                    skyEyeMat.useAlphaFromDiffuseTexture = true;
                    skyEyeMat.transparencyMode = BABYLON.Material.MATERIAL_ALPHABLEND;
                    skyEyeMat.disableLighting = true;
                    skyEyeMat.backFaceCulling = false;
                    skyEyeMat.fogEnabled = false;
                    skyEyeMat.freeze();
                    var skyEyeBase = BABYLON.MeshBuilder.CreatePlane('skyEyeBase',
                        {width: 1, height: 0.75, sideOrientation: BABYLON.Mesh.DOUBLESIDE}, scene);
                    skyEyeBase.material = skyEyeMat;
                    skyEyeBase.isVisible = false;
                    for (var ei = 0; ei < 200; ei++) {
                        var sz = 0.6 + Math.random() * 1.5;
                        var inst = skyEyeBase.createInstance('skyEye' + ei);
                        inst.position.set(
                            (Math.random() - 0.5) * 100,
                            8 + Math.random() * 20,
                            Math.random() * 80 - 5
                        );
                        inst.scaling.setAll(sz);
                        inst.rotation.x = Math.PI / 2 + (Math.random() - 0.5) * 1.2;
                        inst.rotation.y = Math.random() * Math.PI * 2;
                        inst.rotation.z = (Math.random() - 0.5) * 1.4;
                        inst.freezeWorldMatrix();
                    }

                    function spawnCursor() {
                        if (cursorAppearances >= 3) return;
                        var ri = gazeFull ? (gazeIdx + 120) % 360 : Math.max(0, gazeIdx - 240);
                        var look = gazeRing[ri];
                        if (!look) return;
                        var dist = [26, 18, 12][cursorAppearances];
                        cursorFigure.position.set(
                            camera.position.x + look.x * dist,
                            1.6,
                            camera.position.z + look.z * dist
                        );
                        cursorFigure.isVisible = true;
                        cursorVisible = true;
                        cursorAppearances++;
                    }

                    function checkCursorLook() {
                        if (!cursorVisible) return;
                        var toFig = cursorFigure.position.subtract(camera.position).normalize();
                        var dot = BABYLON.Vector3.Dot(toFig, camera.getForwardRay().direction);
                        if (dot > 0.9) {
                            cursorFigure.isVisible = false;
                            cursorVisible = false;
                            window._mysteryEyeFlash && window._mysteryEyeFlash(250);
                            var msgs = ['i was there when you looked', 'you turned too slowly', 'i see where you look'];
                            createSign(msgs[cursorAppearances - 1] || msgs[0],
                                cursorFigure.position.x, 1.3, cursorFigure.position.z, 0, 3, 0.4);
                            cursorTimer = performance.now() + 7000 + Math.random() * 5000;
                        }
                    }

                    // --- Zone triggers ---
                    var zones = [
                        {x:0, z:12, r:3, id:'enter_system', once:false, fired:false},
                        {x:-12, z:8, r:4, id:'enter_documents', once:false, fired:false},
                        {x:12, z:8, r:4, id:'enter_desktop', once:false, fired:false},
                        {x:-28, z:12, r:4, id:'dead_documents', once:false, fired:false},
                        {x:28, z:12, r:4, id:'dead_desktop', once:false, fired:false},
                        {x:0, z:38, r:3, id:'system_fork', once:true, fired:false},
                        {x:-9, z:53, r:4, id:'dead_logs', once:false, fired:false},
                        {x:10, z:50, r:3, id:'enter_archive', once:true, fired:false},
                        {x:12, z:62, r:10, id:'near_mirror', once:true, fired:false}
                    ];

                    function checkZones() {
                        var cx = camera.position.x, cz = camera.position.z;
                        for (var i = 0; i < zones.length; i++) {
                            var z = zones[i];
                            if (z.fired) continue;
                            var dx = cx - z.x, dz = cz - z.z;
                            if (dx * dx + dz * dz < z.r * z.r) {
                                z.fired = true;
                                handleZone(z.id);
                            }
                        }
                    }

                    function resetWalkZones() {
                        for (var i = 0; i < zones.length; i++) {
                            if (!zones[i].once) zones[i].fired = false;
                        }
                    }

                    function fadeAndTeleport(x, z, cb) {
                        fade.className = 'active';
                        setTimeout(function() {
                            camera.position.set(x, 1.7, z);
                            camera.setTarget(new BABYLON.Vector3(x, 1.7, z + 5));
                            resetWalkZones();
                            setTimeout(function() { fade.className = ''; if (cb) cb(); }, 600);
                        }, 800);
                    }

                    function handleZone(id) {
                        switch (id) {
                            case 'enter_system':
                                pathEl.textContent = '/System';
                                if (phase < 1) phase = 1;
                                break;
                            case 'enter_documents':
                                pathEl.textContent = '/Documents/Personal';
                                if (phase < 1) phase = 1;
                                break;
                            case 'enter_desktop':
                                pathEl.textContent = '/Desktop';
                                if (phase < 1) phase = 1;
                                break;
                            case 'dead_documents':
                                wrongCount++;
                                deadDocSign.setText('not yet');
                                fadeAndTeleport(0, -3, function() { pathEl.textContent = '/'; });
                                break;
                            case 'dead_desktop':
                                wrongCount++;
                                monitorSign.setText('i have not written that yet');
                                fadeAndTeleport(0, -3, function() { pathEl.textContent = '/'; });
                                break;
                            case 'system_fork':
                                if (phase < 2) {
                                    phase = 2;
                                    createSign('you picked system first', 2, 1.3, 26, 0, 2.8, 0.4);
                                    createSign('you are making a map', -2, 1.3, 31, 0, 2.4, 0.4);
                                    droneGain.gain.linearRampToValueAtTime(0.05, actx.currentTime + 2);
                                    drone.frequency.linearRampToValueAtTime(36, actx.currentTime + 3);
                                }
                                break;
                            case 'dead_logs':
                                wrongCount++;
                                deadLogsSign.setText('wrong branch');
                                fadeAndTeleport(0, 36, function() { pathEl.textContent = '/System'; });
                                break;
                            case 'enter_archive':
                                if (phase < 3) {
                                    phase = 3;
                                    pathEl.textContent = '/System/Archive';
                                    cursorTimer = performance.now() + 4000;
                                    droneGain.gain.linearRampToValueAtTime(0.07, actx.currentTime + 2);
                                    windGain.gain.linearRampToValueAtTime(0.03, actx.currentTime + 2);
                                }
                                break;
                            case 'near_mirror':
                                if (phase < 4) {
                                    phase = 4;
                                    interactable = true;
                                    promptEl.textContent = '[ Press E to read OPERATION_MIRROR.txt ]';
                                    promptEl.style.opacity = '1';
                                    promptEl.className = 'pulse';
                                    ePlane.isVisible = true;
                                }
                                break;
                        }
                    }

                    // --- Interaction ---
                    function onKey(e) {
                        if (e.keyCode === 69 && interactable && phase === 4) {
                            phase = 5; interactable = false;
                            promptEl.style.opacity = '0';
                            promptEl.className = '';
                            ePlane.isVisible = false;
                            triggerFinale();
                        }
                    }
                    window.addEventListener('keydown', onKey);

                    function triggerFinale() {
                        windGain.gain.linearRampToValueAtTime(0, actx.currentTime + 0.3);
                        droneGain.gain.linearRampToValueAtTime(0, actx.currentTime + 0.3);
                        setTimeout(function() {
                            allSigns.forEach(function(s) { s.setText('MIRROR', '#aa3030'); });
                            pathEl.textContent = 'MIRROR';
                            pathEl.style.color = '#aa4040';
                        }, 1000);
                        setTimeout(function() {
                            // White flash
                            fade.style.background = '#fff';
                            fade.className = 'active';
                            setTimeout(function() {
                                // Kill the 3D but keep overlay
                                window.removeEventListener('keydown', onKey);
                                window.removeEventListener('resize', onResize);
                                clearInterval(typingInt);
                                engine.stopRenderLoop();
                                scene.dispose(); engine.dispose();
                                try { drone.stop(); } catch(e) {}
                                try { windSrc.stop(); } catch(e) {}
                                try { actx.close(); } catch(e) {}
                                promptEl.textContent = ''; pathEl.textContent = '';
                                pathEl.style.color = '';

                                // --- Reverse terminal dissolve ---
                                fade.style.background = '#000';
                                var exitOv = document.createElement('div');
                                Object.assign(exitOv.style, {
                                    position: 'fixed', inset: '0', zIndex: '100000',
                                    background: '#000', overflow: 'hidden',
                                    fontFamily: "'Courier New', Courier, monospace",
                                    fontSize: '14px', lineHeight: '1.65',
                                    color: '#2a5a2a', padding: '28px 32px',
                                    boxSizing: 'border-box', whiteSpace: 'pre'
                                });
                                document.body.appendChild(exitOv);

                                var GLYPHS = '│├└──┼║╠╣█▓░┐┘┌╔╗╚╝';
                                var COLS = 78, ROWS = 32;

                                // Phase A: dense green tree chars dissolving to sparse (1.5s)
                                var tick = 0, TICKS = 35;
                                var exitId = setInterval(function() {
                                    var progress = tick / TICKS;
                                    var density = 1.0 - progress;
                                    var out = '';
                                    for (var r = 0; r < ROWS; r++) {
                                        for (var c = 0; c < COLS; c++) {
                                            out += Math.random() < density
                                                ? GLYPHS[Math.floor(Math.random() * GLYPHS.length)]
                                                : ' ';
                                        }
                                        out += '\n';
                                    }
                                    exitOv.textContent = out;
                                    var g = Math.round(90 - progress * 60);
                                    exitOv.style.color = 'rgb(' + Math.round(g*0.3) + ',' + g + ',' + Math.round(g*0.3) + ')';
                                    if (++tick >= TICKS) {
                                        clearInterval(exitId);
                                        // Phase B: shrink to terminal output (1s)
                                        exitOv.textContent = '';
                                        exitOv.style.color = '#6a8a6a';
                                        var retLines = [
                                            'tree scan complete.',
                                            'objects found: 47',
                                            'anomalies: 1',
                                            '',
                                            'returning to session...'
                                        ];
                                        var li = 0;
                                        var retId = setInterval(function() {
                                            if (li < retLines.length) {
                                                exitOv.textContent += retLines[li++] + '\n';
                                            } else {
                                                clearInterval(retId);
                                                setTimeout(function() {
                                                    exitOv.style.transition = 'opacity 0.6s ease';
                                                    exitOv.style.opacity = '0';
                                                    setTimeout(function() {
                                                        exitOv.remove();
                                                        overlay.className = '';
                                                        fade.className = '';
                                                        fade.style.background = '#000';
                                                        loadingEl.style.display = '';
                                                        window._mysterySceneLock = false;
                                                    }, 700);
                                                }, 600);
                                            }
                                        }, 120);
                                    }
                                }, 42);
                            }, 500);
                        }, 2800);
                    }

                    // --- Render loop ---
                    var lastX = camera.position.x, lastY = camera.position.y, lastZ = camera.position.z;
                    var gazeRing = new Array(360), gazeIdx = 0, gazeFull = false;
                    var _tmpLook = new BABYLON.Vector3();
                    var _tmpUp = BABYLON.Vector3.Up();
                    engine.runRenderLoop(function() {
                        var fwd = camera.getForwardRay().direction;
                        var right = BABYLON.Vector3.Cross(fwd, _tmpUp).normalize();
                        var mX = camera.position.x + right.x * 0.45 + fwd.x * 1.2;
                        var mY = camera.position.y - 0.35;
                        var mZ = camera.position.z + right.z * 0.45 + fwd.z * 1.2;
                        flRoot.position.set(mX, mY, mZ);
                        _tmpLook.set(mX + fwd.x, mY + fwd.y, mZ + fwd.z);
                        flRoot.lookAt(_tmpLook);
                        // Light comes from flashlight tip (further forward)
                        flashSpot.position.set(
                            mX + fwd.x * 0.25,
                            mY + 0.05,
                            mZ + fwd.z * 0.25
                        );
                        flashSpot.direction.copyFrom(fwd);

                        scene.render();
                        var dx = camera.position.x - lastX, dz = camera.position.z - lastZ;
                        if (dx * dx + dz * dz > 0.0009) playStep();
                        lastX = camera.position.x; lastY = camera.position.y; lastZ = camera.position.z;
                        if (camera.position.y < 1.4) camera.position.y = 1.7;
                        if (camera.position.y > 3) camera.position.y = 1.7;
                        checkZones();
                        gazeRing[gazeIdx] = {x: fwd.x, y: fwd.y, z: fwd.z};
                        gazeIdx = (gazeIdx + 1) % 360;
                        if (gazeIdx === 0) gazeFull = true;
                        if (phase >= 3 && phase < 5) {
                            checkCursorLook();
                            if (!cursorVisible && performance.now() > cursorTimer && cursorAppearances < 3) spawnCursor();
                        }
                        var gt = performance.now() * 0.001;
                        glowMat.emissiveColor.g = 0.08 + Math.sin(gt * 2) * 0.04;
                        glowMat.alpha = 0.12 + Math.sin(gt * 1.5) * 0.05;
                        if (ePlane.isVisible) {
                            eMat.emissiveColor.r = 0.7 + Math.sin(gt * 3) * 0.3;
                            eMat.alpha = 0.6 + Math.sin(gt * 2.5) * 0.3;
                            ePlane.position.y = 4 + Math.sin(gt * 1.2) * 0.3;
                        }
                    });

                    var onResize = function() { engine.resize(); };
                    window.addEventListener('resize', onResize);

                    // Safety timeout (5 min max)
                    setTimeout(function() { if (phase < 5) endScene(); }, 300000);
                }

                // Play transition animation. Boot Babylon underneath it so
                // the engine + scene + OBJ models are ready before it ends.
                window._mysterySceneLock = true;

                // Start the transition overlay (sits at z-index 99999, hides everything)
                playTreeTransition(function() {
                    // Transition done — show the already-running forest
                    overlay.style.opacity = '1';
                });

                // Boot the scene immediately (or after CDN loads)
                // The forest canvas renders behind the transition overlay.
                if (typeof BABYLON !== 'undefined') {
                    boot();
                } else {
                    var s1 = document.createElement('script');
                    s1.src = 'https://cdn.babylonjs.com/babylon.js';
                    s1.onload = function() {
                        var s2 = document.createElement('script');
                        s2.src = 'https://cdn.babylonjs.com/loaders/babylonjs.loaders.min.js';
                        s2.onload = function() { boot(); };
                        document.head.appendChild(s2);
                    };
                    document.head.appendChild(s1);
                }
            };
        </script>
        {{{ SCRIPT }}}
    </body>
</html>
